<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小球大乱斗</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap');
    :root {
      --bg: #05060a;
      --panel: rgba(18, 20, 28, 0.72);
      --line: rgba(255, 255, 255, 0.1);
      --text: #f4f4f5;
      --muted: rgba(244, 244, 245, 0.52);
      --accent: #2dd4bf;
      --gold: #fbbf24;
      --danger: #fb7185;
      --screen-mid: #12141c;
      --btn-ink: #042f2e;
      --radius: 16px;
      --radius-sm: 12px;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255,255,255,0.04);
      --shadow-soft: 0 8px 28px rgba(0, 0, 0, 0.28);
      --font-ui: 'Inter', 'Noto Sans SC', 'PingFang SC', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }
    canvas#game { display: block; width: 100%; height: 100%; cursor: default; }

    #overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 10;
      display: grid; grid-template-rows: auto 1fr auto;
    }

    .glass {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px) saturate(1.2);
      -webkit-backdrop-filter: blur(18px) saturate(1.2);
    }

    .topbar {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 14px 16px 0; gap: 16px;
    }
    .left-stack {
      display: flex; flex-direction: column; gap: 10px;
      max-width: min(220px, 40vw);
    }
    .brand {
      padding: 10px 14px;
    }
    .brand .title {
      font-size: 11px; font-weight: 600;
      color: var(--accent);
      margin-bottom: 3px;
    }
    .brand h1 {
      font-size: 17px; font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.25;
    }

    .match-info {
      display: grid;
      grid-template-columns: auto auto;
      gap: 5px 16px;
      padding: 12px 14px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      align-items: baseline;
      min-width: 150px;
    }
    .match-info .k { font-size: 10px; opacity: 0.8; }
    .match-info .v {
      text-align: right; color: var(--text); font-weight: 600; font-size: 13px;
    }
    .match-info .v.accent { color: var(--accent); }
    .match-info .v.gold { color: var(--gold); }
    .match-info .sound-row {
      grid-column: 1 / -1;
      margin-top: 2px;
      padding-top: 8px;
      border-top: 1px solid var(--line);
      display: flex; justify-content: flex-end;
    }
    .sound-btn {
      pointer-events: auto;
      appearance: none;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10px; font-weight: 600;
      padding: 5px 10px;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s, color 0.15s, box-shadow 0.15s;
    }
    .sound-btn:hover { color: var(--text); transform: translateY(-1px); }
    .sound-btn.on {
      color: var(--btn-ink);
      background: var(--accent);
      border-color: transparent;
      box-shadow: 0 6px 18px color-mix(in srgb, var(--accent) 35%, transparent);
    }

    .board { pointer-events: none; width: 100%; font-size: 11px; }
    .board h3 {
      font-size: 11px; font-weight: 600;
      color: var(--muted);
      margin: 0 0 6px 4px;
    }
    .board .rows {
      padding: 8px 10px;
    }
    .board .row {
      display: grid; grid-template-columns: 18px 1fr auto; gap: 8px;
      padding: 4px 4px; color: var(--muted); align-items: center;
      border-radius: 8px;
    }
    .board .row.me {
      color: var(--text);
      background: color-mix(in srgb, var(--accent) 14%, transparent);
    }
    .board .row.me .rank { color: var(--accent); }
    .board .row .rank { opacity: 0.55; font-family: var(--font-mono); font-size: 10px; }
    .board .row .name {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-size: 12px; font-weight: 500;
    }
    .board .row .mass {
      font-family: var(--font-mono); font-size: 11px; font-weight: 600;
    }

    .bottom {
      display: flex; justify-content: space-between; align-items: end;
      padding: 12px 14px 16px; gap: 12px;
    }
    .minimap-wrap { padding: 8px; }
    #minimap {
      display: block; width: 136px; height: 136px;
      border-radius: 12px;
      background: rgba(0,0,0,0.35);
    }

    .skill-panel {
      padding: 10px;
      display: flex; gap: 6px; align-items: stretch; flex-wrap: wrap;
      max-width: min(560px, 72vw); justify-content: flex-end;
    }
    .skill {
      width: 50px; min-height: 56px; border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px; position: relative; overflow: hidden;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .skill .key {
      font-family: var(--font-mono); font-size: 13px; font-weight: 700;
      color: var(--text);
    }
    .skill .lab { font-size: 10px; color: var(--muted); font-weight: 500; }
    .skill .cd {
      position: absolute; inset: 0;
      background: rgba(5, 6, 10, 0.78);
      display: grid; place-items: center;
      font-family: var(--font-mono); font-size: 12px; font-weight: 700;
      opacity: 0; pointer-events: none;
      border-radius: inherit;
    }
    .skill.on-cd .cd { opacity: 1; }
    .skill.ready {
      border-color: color-mix(in srgb, var(--accent) 45%, var(--line));
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 12%, transparent),
                  0 8px 20px color-mix(in srgb, var(--accent) 10%, transparent);
    }
    .skill.flash { animation: skillFlash 0.28s ease; }
    @keyframes skillFlash {
      0% { transform: scale(1.08); background: color-mix(in srgb, var(--accent) 28%, transparent); }
      100% { transform: scale(1); background: rgba(255,255,255,0.03); }
    }

    .center-msg {
      place-self: center; text-align: center; opacity: 0;
      transition: opacity 0.22s, transform 0.22s;
      transform: translateY(6px) scale(0.98);
      pointer-events: none;
    }
    .center-msg.show { opacity: 1; transform: none; }
    .center-msg .big {
      font-size: 32px; font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 10px 40px rgba(0,0,0,0.55);
    }
    .center-msg .sub {
      margin-top: 6px; color: var(--muted); font-size: 13px; font-weight: 500;
    }

    /* ── Menus (Remotion-style compact glass, ~1:32 look) ── */
    #start-screen, #end-screen {
      position: fixed; inset: 0; z-index: 20;
      background:
        radial-gradient(ellipse 80% 55% at 50% -10%, color-mix(in srgb, var(--accent) 22%, transparent), transparent 55%),
        radial-gradient(ellipse 50% 40% at 85% 80%, color-mix(in srgb, var(--accent) 10%, transparent), transparent 50%),
        linear-gradient(180deg, var(--screen-mid) 0%, var(--bg) 65%);
      display: grid; place-items: center; pointer-events: auto;
      overflow: auto; padding: 16px 12px;
    }
    #end-screen { display: none; }

    .card {
      width: min(400px, 92vw);
      padding: 0;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel) 92%, #000);
      box-shadow: var(--shadow), 0 0 80px color-mix(in srgb, var(--accent) 8%, transparent);
      backdrop-filter: blur(22px) saturate(1.25);
      -webkit-backdrop-filter: blur(22px) saturate(1.25);
      overflow: hidden;
      animation: cardIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .card.menu-card {
      width: min(400px, 92vw);
      max-height: min(92vh, 560px);
      display: flex;
      flex-direction: column;
    }
    .card.end-card {
      width: min(400px, 92vw);
      max-height: none;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to { opacity: 1; transform: none; }
    }

    /* decorative floating balls at top of card */
    .menu-hero {
      position: relative;
      height: 96px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--line);
      background:
        radial-gradient(circle at 30% 60%, color-mix(in srgb, var(--accent) 22%, transparent), transparent 50%),
        radial-gradient(circle at 78% 40%, color-mix(in srgb, var(--accent) 12%, transparent), transparent 45%),
        linear-gradient(180deg, rgba(255,255,255,0.04), transparent);
      overflow: hidden;
    }
    .menu-hero .ball {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .menu-hero .ball-1 {
      width: 56px; height: 56px; left: 14%; top: 22%;
      background: radial-gradient(circle at 32% 28%, #fff9, var(--accent) 45%, color-mix(in srgb, var(--accent) 35%, #000));
      box-shadow: 0 10px 28px color-mix(in srgb, var(--accent) 30%, transparent);
      filter: blur(0.8px);
      animation: floatOrb 6.5s ease-in-out infinite;
    }
    .menu-hero .ball-2 {
      width: 34px; height: 34px; left: 42%; top: 38%;
      background: radial-gradient(circle at 35% 30%, #fff8, #f472b6 50%, #831843);
      filter: blur(1.6px); opacity: 0.8;
      animation: floatOrb 5s ease-in-out infinite reverse;
    }
    .menu-hero .ball-3 {
      width: 24px; height: 24px; right: 22%; top: 28%;
      background: radial-gradient(circle at 35% 30%, #fff9, #fbbf24 48%, #92400e);
      filter: blur(1.2px); opacity: 0.85;
      animation: floatOrb 7s ease-in-out infinite;
      animation-delay: -1.2s;
    }
    .menu-hero .ball-4 {
      width: 42px; height: 42px; right: 12%; bottom: 8%;
      background: radial-gradient(circle at 35% 30%, #fff6, #a78bfa 48%, #4c1d95);
      filter: blur(4px); opacity: 0.4;
      animation: floatOrb 8s ease-in-out infinite;
      animation-delay: -2.5s;
    }
    @keyframes floatOrb {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-8px) scale(1.04); }
    }

    .menu-main {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 11px;
      overflow: auto;
      min-height: 0;
    }
    .menu-title {
      margin: 0 0 2px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.03em;
      text-align: center;
      color: var(--text);
    }

    .field {
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }
    .field > label {
      display: block;
      height: 16px;
      line-height: 16px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      margin: 0;
    }
    .field input[type="text"] {
      width: 100%;
      height: 38px;
      box-sizing: border-box;
      padding: 0 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,0.28);
      color: var(--text);
      font-size: 13px;
      font-family: var(--font-ui);
      font-weight: 500;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .field input[type="text"]:focus {
      border-color: color-mix(in srgb, var(--accent) 60%, var(--line));
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
      background: rgba(0,0,0,0.35);
    }

    /* two columns: 名字 | 模式 — labels share one baseline */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: start;
    }
    .form-row .field {
      min-width: 0;
    }

    .pick-grid {
      display: grid;
      gap: 6px;
      width: 100%;
    }
    .mode-grid {
      grid-template-columns: 1fr 1fr;
    }
    .mode-grid .pick {
      height: 38px;
      min-height: 38px;
      padding: 0 10px;
      text-align: left;
      display: flex;
      align-items: center;
      box-sizing: border-box;
    }
    .mode-grid .pick .name {
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
    }
    .mode-grid .pick .desc { display: none; }

    .style-grid,
    .skin-grid {
      grid-template-columns: repeat(4, 1fr);
    }
    .style-grid .pick,
    .skin-grid .pick {
      height: 52px;
      min-height: 52px;
      padding: 6px 3px 5px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .style-grid .pick .swatch {
      width: calc(100% - 4px);
      height: 14px;
      border-radius: 6px;
      margin: 0;
      flex-shrink: 0;
    }
    .skin-grid .pick .swatch {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      margin: 0;
      flex-shrink: 0;
      box-shadow: inset 0 -3px 8px rgba(0,0,0,0.22);
    }
    .style-grid .pick .name,
    .skin-grid .pick .name {
      font-size: 10px;
      line-height: 1;
      font-weight: 600;
    }
    .style-grid .pick .desc,
    .skin-grid .pick .desc { display: none; }

    .pick {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }
    .pick:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--text) 22%, var(--line));
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    .pick.active {
      border-color: color-mix(in srgb, var(--accent) 55%, var(--line));
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 20%, transparent),
                  0 10px 24px color-mix(in srgb, var(--accent) 12%, transparent);
    }
    .pick .name { color: var(--text); }
    .pick .desc { display: none; }

    .menu-actions {
      display: flex;
      gap: 8px;
      margin-top: 2px;
    }
    .menu-actions .btn { flex: 1; }

    @media (max-width: 420px) {
      .form-row { grid-template-columns: 1fr; }
    }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 100%; padding: 11px 16px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 68%, #0f766e));
      color: var(--btn-ink);
      font-family: var(--font-ui);
      font-weight: 700; font-size: 13px;
      cursor: pointer;
      letter-spacing: 0.02em;
      box-shadow: 0 10px 28px color-mix(in srgb, var(--accent) 30%, transparent);
      transition: transform 0.15s, filter 0.15s, box-shadow 0.15s;
    }
    .btn:hover {
      filter: brightness(1.06);
      transform: translateY(-2px);
      box-shadow: 0 14px 32px color-mix(in srgb, var(--accent) 38%, transparent);
    }
    .btn:active { transform: translateY(0); filter: brightness(0.98); }
    .btn.ghost {
      margin-top: 0;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border: 1px solid var(--line);
      box-shadow: none;
      font-weight: 600;
      font-size: 12px;
    }
    .btn.ghost:hover {
      background: rgba(255,255,255,0.08);
      filter: none; box-shadow: none;
    }

    /* end screen keeps single column compact */
    .card-head {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--line);
    }
    .card .eyebrow {
      font-size: 12px; font-weight: 600;
      color: var(--accent);
    }
    .card h2 {
      font-size: 22px; font-weight: 800;
      margin: 5px 0 0;
      letter-spacing: -0.02em;
    }
    .card-body { padding: 10px 16px 16px; }
    .card > p, .card-body > p {
      color: var(--muted); line-height: 1.5; font-size: 12px;
    }

    .stats-end {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      margin: 12px 0 12px;
    }
    .stat-box {
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
    }
    .stat-box .lbl { font-size: 10px; color: var(--muted); font-weight: 600; }
    .stat-box .val {
      margin-top: 3px; font-size: 18px; font-weight: 700;
      font-family: var(--font-mono); color: var(--accent);
    }

    body.theme-cyber { --accent: #22d3ee; --gold: #e879f9; --screen-mid: #0c1020; --btn-ink: #042f2e; }
    body.theme-candy { --accent: #f472b6; --gold: #fbbf24; --screen-mid: #1a1018; --btn-ink: #3b0764; }
    body.theme-ink { --accent: #e4e4e7; --gold: #d6c3a8; --screen-mid: #141210; --btn-ink: #18181b; }
    body.theme-aurora { --accent: #a78bfa; --gold: #34d399; --screen-mid: #120f1e; --btn-ink: #1e1035; }
    body.theme-neon { --accent: #2dd4bf; --gold: #fbbf24; --screen-mid: #0e1418; --btn-ink: #042f2e; }

    body.theme-day,
    body.theme-paper,
    body.theme-mint {
      --bg: #f4f1eb;
      --panel: rgba(255, 255, 255, 0.78);
      --line: rgba(24, 24, 27, 0.1);
      --text: #18181b;
      --muted: rgba(24, 24, 27, 0.5);
      --btn-ink: #ffffff;
      --shadow: 0 18px 50px rgba(24, 24, 27, 0.1), 0 0 0 1px rgba(24,24,27,0.04);
      --shadow-soft: 0 8px 24px rgba(24, 24, 27, 0.08);
    }
    body.theme-day {
      --accent: #0d9488; --gold: #d97706;
      --screen-mid: #e0eef8; --bg: #eef3f8;
    }
    body.theme-paper {
      --accent: #c2410c; --gold: #b45309;
      --screen-mid: #f3e7d8; --bg: #f6efe6;
    }
    body.theme-mint {
      --accent: #059669; --gold: #ca8a04;
      --screen-mid: #dcf5e8; --bg: #eaf8f1;
    }
    body.theme-day .card,
    body.theme-paper .card,
    body.theme-mint .card {
      background: rgba(255,255,255,0.9);
    }
    body.theme-day .field input[type="text"],
    body.theme-paper .field input[type="text"],
    body.theme-mint .field input[type="text"] {
      background: rgba(255,255,255,0.9); color: var(--text);
    }
    body.theme-day .stat-box,
    body.theme-paper .stat-box,
    body.theme-mint .stat-box {
      background: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body class="theme-neon">
  <canvas id="game"></canvas>
  <div id="overlay">
    <div class="topbar">
      <div class="left-stack">
        <div class="brand glass">
          <div class="title" id="hud-mode-label">竞技</div>
          <h1>小球大乱斗</h1>
        </div>
        <div class="board" id="leaderboard">
          <h3>榜</h3>
          <div class="rows glass" id="lb-rows"></div>
        </div>
      </div>
      <div class="match-info glass">
        <span class="k">质量</span><span class="v accent" id="hud-mass">10</span>
        <span class="k">分数</span><span class="v gold" id="hud-score">0</span>
        <span class="k">存活</span><span class="v" id="hud-time">0:00</span>
        <span class="k">击杀</span><span class="v" id="hud-kills">0</span>
        <div class="sound-row">
          <button class="sound-btn on" id="btn-sound" type="button" title="开关音效">音效</button>
        </div>
      </div>
    </div>
    <div class="center-msg" id="toast"><div class="big" id="toast-big"></div><div class="sub" id="toast-sub"></div></div>
    <div class="bottom">
      <div class="minimap-wrap glass"><canvas id="minimap" width="148" height="148"></canvas></div>
      <div class="skill-panel glass" id="skill-panel">
        <div class="skill ready" data-key="j"><span class="key">J</span><span class="lab">分裂</span><div class="cd">0</div></div>
        <div class="skill ready" data-key="k"><span class="key">K</span><span class="lab">吐球</span><div class="cd">0</div></div>
        <div class="skill ready" data-key="l"><span class="key">L</span><span class="lab">急停</span><div class="cd">0</div></div>
        <div class="skill ready" data-key="u"><span class="key">U</span><span class="lab">再分</span><div class="cd">0</div></div>
        <div class="skill ready" data-key="g"><span class="key">G</span><span class="lab">合球</span><div class="cd">0</div></div>
        <div class="skill ready" data-key="i"><span class="key">I</span><span class="lab">冲刺</span><div class="cd">0</div></div>
        <div class="skill ready" data-key="o"><span class="key">O</span><span class="lab">护盾</span><div class="cd">0</div></div>

(() => {

  // ─── Themes ───────────────────────────────────────────────

      swatch: 'linear-gradient(135deg,#d1fae5,#ecfdf5,#059669)',
      bg0: '#e8faf1', bg1: '#d5f0e4',
      grid: 'rgba(6,78,59,0.06)',

      foodAlpha: 1,
      ambient: 'mint',
      nameShadow: true
    }
  };

  const TEAM_COUNT = 7;
  const TEAM_COLORS = [
    '#38bdf8', '#f472b6', '#fbbf24', '#4ade80',
    '#a78bfa', '#fb7185', '#22d3ee'
  ];
  const TEAM_NAMES = ['苍穹','绯红','琥珀','翡翠','星紫','赤霞','霜蓝'];

  // ─── Skins ────────────────────────────────────────────────
  function drawSkinGlow(ctx, s, r, color, alpha = 0.22) {
    const rgb = hexToRgb(color);
    const g = ctx.createRadialGradient(s.x, s.y, r * 0.4, s.x, s.y, r * 1.35);
    g.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})`);
    g.addColorStop(1, 'transparent');
    ctx.beginPath(); ctx.arc(s.x, s.y, r * 1.35, 0, Math.PI * 2);
    ctx.fillStyle = g; ctx.fill();
  }

  const SKINS = {
    classic: {
      id: 'classic', name: '经典', desc: '玻璃高光',
      color: '#5eead4',
      draw(ctx, s, r, cell, t) {
        const rgb = hexToRgb(cell.color);
        drawSkinGlow(ctx, s, r, cell.color, 0.2);
        const grad = ctx.createRadialGradient(s.x - r * 0.28, s.y - r * 0.32, r * 0.05, s.x, s.y, r);
        grad.addColorStop(0, `rgb(${Math.min(255, rgb.r + 70)},${Math.min(255, rgb.g + 70)},${Math.min(255, rgb.b + 70)})`);
        grad.addColorStop(0.45, cell.color);
        grad.addColorStop(1, `rgb(${rgb.r * 0.35 | 0},${rgb.g * 0.4 | 0},${rgb.b * 0.45 | 0})`);
        ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
        ctx.fillStyle = grad; ctx.fill();
        ctx.beginPath();
        ctx.ellipse(s.x - r * 0.22, s.y - r * 0.3, r * 0.34, r * 0.18, -0.55, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.28)'; ctx.fill();
        ctx.beginPath();
        ctx.arc(s.x + r * 0.28, s.y + r * 0.32, r * 0.12, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.22)';
        ctx.lineWidth = Math.max(1, r * 0.04);
        ctx.beginPath(); ctx.arc(s.x, s.y, r * 0.96, 0, Math.PI * 2); ctx.stroke();
      },
      drawEject(ctx, s, r, e, t) {
        const rgb = hexToRgb(e.color);
        const g = ctx.createRadialGradient(s.x - r * 0.2, s.y - r * 0.2, 0, s.x, s.y, r);
        g.addColorStop(0, '#fff');
        g.addColorStop(0.4, e.color);
        g.addColorStop(1, `rgb(${rgb.r * 0.4 | 0},${rgb.g * 0.4 | 0},${rgb.b * 0.4 | 0})`);
        ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
        ctx.fillStyle = g; ctx.fill();
      }
    },
    metal: {
      id: 'metal', name: '金属', desc: '镜面钢质',
      color: '#94a3b8',
      draw(ctx, s, r, cell, t) {
        drawSkinGlow(ctx, s, r, '#cbd5e1', 0.15);
        const grad = ctx.createLinearGradient(s.x - r, s.y - r, s.x + r, s.y + r);
        grad.addColorStop(0, '#f8fafc');
        grad.addColorStop(0.22, '#cbd5e1');
        grad.addColorStop(0.4, cell.color);
        grad.addColorStop(0.55, '#1e293b');
        grad.addColorStop(0.72, cell.color);
        grad.addColorStop(1, '#0f172a');
        ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
        ctx.fillStyle = grad; ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.45)';
        ctx.lineWidth = Math.max(1.2, r * 0.07);
        ctx.stroke();
        // brushed lines
        ctx.save();
        ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2); ctx.clip();
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 1;
        for (let i = -4; i <= 4; i++) {
          ctx.beginPath();
          ctx.moveTo(s.x - r, s.y + i * r * 0.18);
          ctx.lineTo(s.x + r, s.y + i * r * 0.18 + r * 0.08);
          ctx.stroke();
        }
        ctx.restore();
        ctx.beginPath();
        ctx.arc(s.x - r * 0.28, s.y - r * 0.32, r * 0.2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.fill();
      },
      drawEject(ctx, s, r, e, t) {
        const g = ctx.createLinearGradient(s.x - r, s.y - r, s.x + r, s.y + r);
        g.addColorStop(0, '#f1f5f9');
        g.addColorStop(0.5, e.color);
        g.addColorStop(1, '#334155');
        ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
        ctx.fillStyle = g; ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 1; ctx.stroke();
      }
    },
    rainbow: {
      id: 'rainbow', name: '彩虹', desc: '流光环带',
      color: '#f472b6',
      draw(ctx, s, r, cell, t) {
        const hue = (t * 70 + cell.x * 0.03 + cell.y * 0.02) % 360;
        drawSkinGlow(ctx, s, r, cell.color, 0.25);
        // outer prism ring
        for (let i = 0; i < 6; i++) {
          const a0 = t * 1.2 + i * Math.PI / 3;
          ctx.beginPath();
          ctx.arc(s.x, s.y, r * 1.08, a0, a0 + 0.4);
          ctx.strokeStyle = `hsla(${(hue + i * 40) % 360},100%,70%,0.55)`;
          ctx.lineWidth = Math.max(2, r * 0.08);
          ctx.stroke();
        }
        const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r);
        grad.addColorStop(0, `hsl(${hue},95%,80%)`);
        grad.addColorStop(0.45, `hsl(${(hue + 50) % 360},90%,58%)`);
        grad.addColorStop(1, `hsl(${(hue + 130) % 360},85%,32%)`);
        ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
        ctx.fillStyle = grad; ctx.fill();
        ctx.strokeStyle = `hsla(${(hue + 30) % 360},100%,85%,0.55)`;
        ctx.lineWidth = Math.max(1.5, r * 0.07);
        ctx.stroke();
      },
      drawEject(ctx, s, r, e, t) {
        const hue = (t * 90 + e.x * 0.05) % 360;
        const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r);
        g.addColorStop(0, `hsl(${hue},95%,75%)`);
        g.addColorStop(1, `hsl(${(hue + 80) % 360},85%,40%)`);
        ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
        ctx.fillStyle = g; ctx.fill();
        ctx.strokeStyle = `hsla(${hue},100%,80%,0.7)`;
        ctx.lineWidth = 1.5; ctx.stroke();
      }
    },
    planet: {
      id: 'planet', name: '星球', desc: '大气与光环',
      color: '#60a5fa',
      draw(ctx, s, r, cell, t) {
        const rgb = hexToRgb(cell.color);
        const atmo = ctx.createRadialGradient(s.x, s.y, r * 0.65, s.x, s.y, r * 1.4);
        atmo.addColorStop(0, 'transparent');
        atmo.addColorStop(0.55, `rgba(${rgb.r},${rgb.g},${rgb.b},0.18)`);
        atmo.addColorStop(1, 'transparent');
        ctx.beginPath(); ctx.arc(s.x, s.y, r * 1.4, 0, Math.PI * 2);
        ctx.fillStyle = atmo; ctx.fill();

        const grad = ctx.createRadialGradient(s.x - r * 0.3, s.y - r * 0.35, r * 0.08, s.x, s.y, r);
        grad.addColorStop(0, `rgb(${Math.min(255, rgb.r + 50)},${Math.min(255, rgb.g + 50)},${Math.min(255, rgb.b + 55)})`);
        grad.addColorStop(0.55, cell.color);
        grad.addColorStop(1, `rgb(${rgb.r * 0.28 | 0},${rgb.g * 0.3 | 0},${rgb.b * 0.4 | 0})`);
        ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
        ctx.fillStyle = grad; ctx.fill();

        ctx.save();
        ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2); ctx.clip();
        ctx.strokeStyle = 'rgba(255,255,255,0.14)';
        ctx.lineWidth = r * 0.07;
        for (let i = -2; i <= 2; i++) {
          ctx.beginPath();
          ctx.ellipse(s.x, s.y + i * r * 0.26, r * 0.95, r * 0.16, 0.12, 0, Math.PI * 2);
          ctx.stroke();
        }
        // city lights
        for (let i = 0; i < 8; i++) {
          const a = t * 0.15 + i * 0.9;
          ctx.fillStyle = 'rgba(255,240,180,0.35)';
          ctx.beginPath();
          ctx.arc(s.x + Math.cos(a) * r * 0.55, s.y + Math.sin(a) * r * 0.4, r * 0.03, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();

        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.rotate(0.4 + Math.sin(t * 0.35) * 0.06);
        ctx.scale(1, 0.26);
        ctx.beginPath();
        ctx.arc(0, 0, r * 1.55, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(${rgb.r + 40},${rgb.g + 40},${rgb.b},0.55)`;
        ctx.lineWidth = Math.max(2, r * 0.14);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, 0, r * 1.7, 0.2, Math.PI - 0.2);
        ctx.strokeStyle = `rgba(255,255,255,0.15)`;
        ctx.lineWidth = Math.max(1, r * 0.05);
        ctx.stroke();
        ctx.restore();
      },
      drawEject(ctx, s, r, e, t) {
        const rgb = hexToRgb(e.color);
        const g = ctx.createRadialGradient(s.x - r * 0.2, s.y - r * 0.2, 0, s.x, s.y, r);
        g.addColorStop(0, `rgb(${Math.min(255, rgb.r + 40)},${Math.min(255, rgb.g + 40)},${Math.min(255, rgb.b + 40)})`);
        g.addColorStop(1, `rgb(${rgb.r * 0.35 | 0},${rgb.g * 0.35 | 0},${rgb.b * 0.4 | 0})`);
        ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
        ctx.fillStyle = g; ctx.fill();
        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.scale(1, 0.35);
        ctx.beginPath(); ctx.arc(0, 0, r * 1.35, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.5)`;
        ctx.lineWidth = 1.5; ctx.stroke();
        ctx.restore();
      }
    },
    eye: {
      id: 'eye', name: '眼球', desc: '注视方向',
      color: '#38bdf8',
      draw(ctx, s, r, cell, t) {
        drawSkinGlow(ctx, s, r, '#e0f2fe', 0.12);
        const white = ctx.createRadialGradient(s.x - r * 0.15, s.y - r * 0.2, r * 0.1, s.x, s.y, r);
        white.addColorStop(0, '#ffffff');
        white.addColorStop(0.7, '#e2e8f0');
        white.addColorStop(1, '#94a3b8');
        ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
        ctx.fillStyle = white; ctx.fill();
        ctx.strokeStyle = 'rgba(15,23,42,0.12)';
        ctx.lineWidth = Math.max(1, r * 0.04); ctx.stroke();

        const look = Math.atan2(cell.vy, cell.vx) || 0;
        const irisR = r * 0.5;
        const ox = Math.cos(look) * r * 0.2;
        const oy = Math.sin(look) * r * 0.2;
        const irisGrad = ctx.createRadialGradient(s.x + ox, s.y + oy, 0, s.x + ox, s.y + oy, irisR);
        irisGrad.addColorStop(0, '#7dd3fc');
        irisGrad.addColorStop(0.35, cell.color);
        irisGrad.addColorStop(0.75, '#0369a1');
        irisGrad.addColorStop(1, '#0f172a');
        ctx.beginPath(); ctx.arc(s.x + ox, s.y + oy, irisR, 0, Math.PI * 2);
        ctx.fillStyle = irisGrad; ctx.fill();
        // iris spokes
        ctx.strokeStyle = 'rgba(15,23,42,0.25)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 10; i++) {
          const a = look + i * Math.PI / 5;
          ctx.beginPath();
          ctx.moveTo(s.x + ox, s.y + oy);
          ctx.lineTo(s.x + ox + Math.cos(a) * irisR, s.y + oy + Math.sin(a) * irisR);
          ctx.stroke();
        }
        ctx.beginPath(); ctx.arc(s.x + ox, s.y + oy, irisR * 0.38, 0, Math.PI * 2);
        ctx.fillStyle = '#020617'; ctx.fill();
        ctx.beginPath();
        ctx.arc(s.x + ox - irisR * 0.18, s.y + oy - irisR * 0.2, irisR * 0.14, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.fill();
      },
      drawEject(ctx, s, r, e, t) {
        ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
        ctx.fillStyle = '#f8fafc'; ctx.fill();
        ctx.beginPath(); ctx.arc(s.x + r * 0.1, s.y, r * 0.45, 0, Math.PI * 2);
        ctx.fillStyle = e.color; ctx.fill();
        ctx.beginPath(); ctx.arc(s.x + r * 0.12, s.y, r * 0.2, 0, Math.PI * 2);
        ctx.fillStyle = '#0f172a'; ctx.fill();
      }
    },
    flame: {
      id: 'flame', name: '火焰', desc: '焰心跳动',
      color: '#f97316',
      draw(ctx, s, r, cell, t) {
        drawSkinGlow(ctx, s, r, '#fb923c', 0.3);
        const spikes = 16;
        ctx.beginPath();
        for (let i = 0; i <= spikes; i++) {
          const a = (i / spikes) * Math.PI * 2 + t * 2.2;
          const flicker = 0.82 + 0.2 * Math.sin(t * 11 + i * 1.7) + 0.08 * Math.sin(t * 19 + i * 2.3);
          const rr = r * flicker;
          const x = s.x + Math.cos(a) * rr;
          const y = s.y + Math.sin(a) * rr;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
        const grad = ctx.createRadialGradient(s.x, s.y - r * 0.1, r * 0.08, s.x, s.y, r * 1.2);
        grad.addColorStop(0, '#fff7ed');
        grad.addColorStop(0.2, '#fde047');
        grad.addColorStop(0.45, '#fb923c');
        grad.addColorStop(0.75, cell.color);
        grad.addColorStop(1, '#7c2d12');
        ctx.fillStyle = grad; ctx.fill();
        // inner core
        ctx.beginPath();
        ctx.ellipse(s.x, s.y + r * 0.05, r * 0.35, r * 0.42, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(254,243,199,0.55)'; ctx.fill();
      },
      drawEject(ctx, s, r, e, t) {
        const spikes = 8;
        ctx.beginPath();
        for (let i = 0; i <= spikes; i++) {
          const a = (i / spikes) * Math.PI * 2 + t * 4;
          const rr = r * (0.75 + 0.25 * Math.sin(t * 12 + i));
          const x = s.x + Math.cos(a) * rr;
          const y = s.y + Math.sin(a) * rr;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
        const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r);
        g.addColorStop(0, '#fef08a');
        g.addColorStop(0.6, e.color);
        g.addColorStop(1, '#9a3412');
        ctx.fillStyle = g; ctx.fill();
      }
    },
    ice: {
      id: 'ice', name: '冰晶', desc: '棱面折射',
      color: '#67e8f9',
      draw(ctx, s, r, cell, t) {
        drawSkinGlow(ctx, s, r, '#a5f3fc', 0.22);
        const n = 6;
        ctx.beginPath();
        for (let i = 0; i < n; i++) {
          const a = (i / n) * Math.PI * 2 - Math.PI / 2 + t * 0.12;
          const rr = i % 2 === 0 ? r : r * 0.76;
          const x = s.x + Math.cos(a) * rr;
          const y = s.y + Math.sin(a) * rr;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
        const grad = ctx.createRadialGradient(s.x - r * 0.25, s.y - r * 0.25, 0, s.x, s.y, r);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.35, '#ecfeff');
        grad.addColorStop(0.65, cell.color);
        grad.addColorStop(1, '#0e7490');
        ctx.fillStyle = grad; ctx.fill();
        ctx.strokeStyle = 'rgba(224,242,254,0.85)';
        ctx.lineWidth = Math.max(1.2, r * 0.06);
        ctx.stroke();
        // facet lines
        ctx.strokeStyle = 'rgba(255,255,255,0.35)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 6; i++) {
          const a = t * 0.2 + i * Math.PI / 3;
          ctx.beginPath();
          ctx.moveTo(s.x, s.y);
          ctx.lineTo(s.x + Math.cos(a) * r * 0.75, s.y + Math.sin(a) * r * 0.75);
          ctx.stroke();
        }
        ctx.beginPath();
        ctx.arc(s.x - r * 0.2, s.y - r * 0.25, r * 0.12, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.fill();
      },
      drawEject(ctx, s, r, e, t) {
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2 - Math.PI / 2;
          const x = s.x + Math.cos(a) * r;
          const y = s.y + Math.sin(a) * r;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
        const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r);
        g.addColorStop(0, '#ecfeff');
        g.addColorStop(1, e.color);
        ctx.fillStyle = g; ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 1; ctx.stroke();
      }
    },
    ghost: {
      id: 'ghost', name: '幽灵', desc: '半透明灵体',
      color: '#c4b5fd',
      draw(ctx, s, r, cell, t) {
        const pulse = 0.9 + 0.08 * Math.sin(t * 2.8);
        ctx.globalAlpha = 0.5 + 0.18 * Math.sin(t * 2);
        drawSkinGlow(ctx, s, r * pulse, cell.color, 0.35);
        const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r * pulse);
        grad.addColorStop(0, 'rgba(255,255,255,0.65)');
        grad.addColorStop(0.4, cell.color);
        grad.addColorStop(0.85, 'rgba(76,29,149,0.35)');
        grad.addColorStop(1, 'rgba(30,20,60,0.05)');
        ctx.beginPath(); ctx.arc(s.x, s.y, r * pulse, 0, Math.PI * 2);
        ctx.fillStyle = grad; ctx.fill();
        // wavy bottom hint
        ctx.beginPath();
        for (let i = 0; i <= 8; i++) {
          const a = Math.PI * 0.15 + (i / 8) * Math.PI * 0.7;
          const rr = r * pulse * (0.92 + 0.08 * Math.sin(t * 5 + i));
          const x = s.x + Math.cos(a + Math.PI * 0.5) * rr * 0.7;
          const y = s.y + r * pulse * 0.55 + Math.sin(t * 4 + i) * r * 0.08;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1; ctx.stroke();
        ctx.globalAlpha = 0.95;
        const er = r * 0.11;
        ctx.fillStyle = '#1e1b4b';
        ctx.beginPath(); ctx.arc(s.x - r * 0.2, s.y - r * 0.08, er, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(s.x + r * 0.2, s.y - r * 0.08, er, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.beginPath(); ctx.arc(s.x - r * 0.18, s.y - r * 0.1, er * 0.35, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(s.x + r * 0.22, s.y - r * 0.1, er * 0.35, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
      },
      drawEject(ctx, s, r, e, t) {
        ctx.globalAlpha = 0.65;
        const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r);
        g.addColorStop(0, 'rgba(255,255,255,0.7)');
        g.addColorStop(1, e.color);
        ctx.beginPath(); ctx.arc(s.x, s.y, r * (0.9 + 0.1 * Math.sin(t * 5)), 0, Math.PI * 2);
        ctx.fillStyle = g; ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  };

  // ─── DOM ──────────────────────────────────────────────────
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const minimap = document.getElementById('minimap');
  const mctx = minimap.getContext('2d');
  const startScreen = document.getElementById('start-screen');
  const endScreen = document.getElementById('end-screen');
  const nameInput = document.getElementById('name-input');
  const toastEl = document.getElementById('toast');
  const toastBig = document.getElementById('toast-big');
  const toastSub = document.getElementById('toast-sub');
  const skillEls = {};
  document.querySelectorAll('.skill').forEach(el => { skillEls[el.dataset.key] = el; });

  let W = 0, H = 0, dpr = 1;
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ─── Helpers ──────────────────────────────────────────────
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const lerp = (a, b, t) => a + (b - a) * t;
  const dist = (ax, ay, bx, by) => Math.hypot(bx - ax, by - ay);
  const rand = (a, b) => a + Math.random() * (b - a);
  const pick = (arr) => arr[(Math.random() * arr.length) | 0];
  const massToR = (m) => Math.sqrt(Math.max(m, 0.1)) * 4.2;
  // Smaller mass → much higher speed; large mass → sluggish.
  // m=12 ≈ 4.0, m=36 ≈ 2.7, m=100 ≈ 1.8, m=400 ≈ 1.1, m=1500 ≈ 0.7
  const speedOf = (m) => 8.6 * Math.pow(Math.max(m, 1), -0.34);
  const formatTime = (s) => {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + String(sec).padStart(2, '0');
  };
  function hexToRgb(hex) {
    const h = hex.replace('#', '');
    return {
      r: parseInt(h.slice(0, 2), 16),
      g: parseInt(h.slice(2, 4), 16),
      b: parseInt(h.slice(4, 6), 16)
    };
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }

  // ─── Sound (Web Audio, synthesized) ───────────────────────
  const SFX = (() => {
    let ctx = null;
    let master = null;
    let enabled = localStorage.getItem('bb_sfx') !== '0';
    let unlocked = false;
    const last = Object.create(null);
    let magnetNodes = null;
    let bgmOn = false;
    let bgmMode = 'menu'; // menu | game
    let bgmEl = null;

    // Bilibili BV11i421a7Ps — 彩豆森林（yutto 音频提取）
    // 菜单 / 局内共用同一条 BGM 循环
    const tracks = {
      menu: new Audio('audio/bgm.mp3'),
      game: new Audio('audio/bgm.mp3')
    };
    tracks.menu.loop = true;
    tracks.game.loop = true;
    tracks.menu.volume = 0.42;
    tracks.game.volume = 0.48;
    tracks.menu.preload = 'auto';
    tracks.game.preload = 'auto';

    const sfxFiles = {
      eat: 'audio/eat.wav',
      pop: 'audio/pop.wav'
    };

    function playFile(src, vol = 0.5) {
      if (!enabled) return;
      try {
        const a = new Audio(src);
        a.volume = vol;
        a.play().catch(() => {});
      } catch (_) {}
    }

    function ensure() {
      if (!ctx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return null;
        ctx = new AC();
        master = ctx.createGain();
        master.gain.value = enabled ? 0.32 : 0;
        master.connect(ctx.destination);
      }
      if (ctx.state === 'suspended') ctx.resume();
      unlocked = true;
      return ctx;
    }

    function setEnabled(on) {
      const wasOn = enabled;
      enabled = !!on;
      localStorage.setItem('bb_sfx', enabled ? '1' : '0');
      if (master) master.gain.value = enabled ? 0.32 : 0;
      if (!enabled) {
        stopMagnetHum();
        stopBGM(true);
      } else if (wasOn === false) {
        if (state === 'menu' || state === 'dead') startBGM('menu');
        else if (state === 'play' || state === 'pause') startBGM('game');
      }
      return enabled;
    }

    function isEnabled() { return enabled; }

    function startBGM(mode) {
      if (mode) bgmMode = mode;
      bgmOn = true;
      if (!enabled) return;
      ensure();
      const next = tracks[bgmMode] || tracks.menu;
      // stop other track
      Object.values(tracks).forEach(t => {
        if (t !== next) {
          try { t.pause(); t.currentTime = 0; } catch (_) {}
        }
      });
      bgmEl = next;
      try {
        if (bgmEl.paused) {
          bgmEl.currentTime = 0;
          bgmEl.play().catch(() => {});
        } else {
          // already playing this track
          bgmEl.play().catch(() => {});
        }
      } catch (_) {}
    }

    function stopBGM(immediate) {
      bgmOn = false;
      Object.values(tracks).forEach(t => {
        try {
          t.pause();
          if (immediate) t.currentTime = 0;
        } catch (_) {}
      });
      bgmEl = null;
    }

    function pauseBGM() {
      if (bgmEl) {
        try { bgmEl.pause(); } catch (_) {}
      }
    }

    function resumeBGM() {
      if (!bgmOn || !enabled) return;
      ensure();
      if (!bgmEl) bgmEl = tracks[bgmMode] || tracks.menu;
      try { bgmEl.play().catch(() => {}); } catch (_) {}
    }

    function can(name, gap) {
      const t = performance.now();
      if (last[name] && t - last[name] < gap) return false;
      last[name] = t;
      return true;
    }

    function envGain(t0, a, d, s, r, peak = 1) {
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(Math.max(0.0001, peak), t0 + a);
      g.gain.exponentialRampToValueAtTime(Math.max(0.0001, peak * s), t0 + a + d);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + a + d + r);
      return g;
    }

    function tone(freq, dur, type, peak, slideTo) {
      if (!ensure() || !enabled) return;
      const t0 = ctx.currentTime;
      const o = ctx.createOscillator();
      const g = envGain(t0, 0.01, dur * 0.35, 0.35, dur * 0.55, peak);
      o.type = type || 'sine';
      o.frequency.setValueAtTime(freq, t0);
      if (slideTo != null) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t0 + dur);
      o.connect(g); g.connect(master);
      o.start(t0); o.stop(t0 + dur + 0.05);
    }

    function noiseBurst(dur, peak, hpFreq) {
      if (!ensure() || !enabled) return;
      const t0 = ctx.currentTime;
      const n = Math.max(1, Math.floor(ctx.sampleRate * dur));
      const buf = ctx.createBuffer(1, n, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < n; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / n);
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const filter = ctx.createBiquadFilter();
      filter.type = 'highpass';
      filter.frequency.value = hpFreq || 400;
      const g = envGain(t0, 0.005, dur * 0.2, 0.25, dur * 0.7, peak);
      src.connect(filter); filter.connect(g); g.connect(master);
      src.start(t0); src.stop(t0 + dur + 0.02);
    }

    function chord(freqs, dur, type, peak) {
      freqs.forEach((f, i) => tone(f, dur, type, peak * (1 - i * 0.12), null));
    }

    function play(name, extra) {
      if (!enabled) return;
      if (!ensure()) return;

      switch (name) {
        case 'start':
          chord([392, 494, 659], 0.28, 'triangle', 0.35);
          setTimeout(() => tone(784, 0.22, 'sine', 0.22, 988), 80);
          break;
        case 'eat': {
          if (!can('eat', 32)) return;
          // soft water-drop / gulp — not sharp ding
          playFile(sfxFiles.eat, 0.55);
          break;
        }
        case 'eject':
          if (!can('eject', 50)) return;
          tone(240, 0.08, 'square', 0.08, 120);
          noiseBurst(0.05, 0.06, 800);
          break;
        case 'split':
          if (!can('split', 70)) return;
          noiseBurst(0.1, 0.18, 600);
          tone(180, 0.12, 'sawtooth', 0.12, 420);
          tone(520, 0.1, 'sine', 0.14, 880);
          break;
        case 'multisplit':
          noiseBurst(0.14, 0.22, 500);
          tone(160, 0.16, 'sawtooth', 0.16, 500);
          setTimeout(() => { tone(300, 0.12, 'triangle', 0.14, 720); noiseBurst(0.08, 0.12, 700); }, 70);
          break;
        case 'brake':
          noiseBurst(0.12, 0.2, 200);
          tone(90, 0.15, 'sine', 0.22, 40);
          break;
        case 'dash':
          noiseBurst(0.16, 0.22, 300);
          tone(220, 0.18, 'sawtooth', 0.16, 80);
          tone(880, 0.12, 'sine', 0.1, 220);
          break;
        case 'shield':
          chord([523, 659, 784], 0.35, 'sine', 0.2);
          tone(1046, 0.4, 'triangle', 0.12, 1318);
          break;
        case 'magnet':
          tone(110, 0.35, 'sine', 0.16, 165);
          tone(220, 0.3, 'triangle', 0.1, 330);
          noiseBurst(0.2, 0.1, 400);
          startMagnetHum();
          break;
        case 'expand':
          noiseBurst(0.2, 0.25, 150);
          tone(80, 0.35, 'sine', 0.35, 200);
          tone(160, 0.3, 'triangle', 0.18, 480);
          setTimeout(() => chord([392, 523, 659], 0.25, 'sine', 0.18), 60);
          break;
        case 'kill':
          playFile(sfxFiles.pop, 0.6);
          setTimeout(() => playFile(sfxFiles.eat, 0.4), 40);
          break;
        case 'eatPlayer':
          if (!can('eatPlayer', 80)) return;
          playFile(sfxFiles.pop, 0.5);
          break;
        case 'death':
          stopMagnetHum();
          tone(220, 0.45, 'sawtooth', 0.2, 55);
          tone(110, 0.55, 'sine', 0.25, 40);
          noiseBurst(0.35, 0.18, 200);
          setTimeout(() => tone(73, 0.5, 'triangle', 0.15, 40), 100);
          break;
        case 'virus':
          noiseBurst(0.18, 0.28, 900);
          tone(900, 0.12, 'square', 0.12, 200);
          tone(140, 0.2, 'sawtooth', 0.14, 60);
          break;
        case 'pause':
          tone(440, 0.08, 'sine', 0.1, null);
          tone(330, 0.12, 'sine', 0.08, null);
          break;
        case 'resume':
          tone(330, 0.08, 'sine', 0.08, null);
          tone(440, 0.1, 'sine', 0.1, null);
          break;
        case 'dir':
          if (!can('dir', 90)) return;
          tone(640 + rand(-30, 30), 0.04, 'sine', 0.05, 720);
          break;
        case 'ui':
          tone(660, 0.06, 'sine', 0.08, 880);
          break;
        default:
          break;
      }
    }

    function startMagnetHum() {
      if (!ensure() || !enabled) return;
      stopMagnetHum();
      const t0 = ctx.currentTime;
      const o1 = ctx.createOscillator();
      const o2 = ctx.createOscillator();
      const lfo = ctx.createOscillator();
      const lfoG = ctx.createGain();
      const g = ctx.createGain();
      o1.type = 'sine'; o1.frequency.value = 55;
      o2.type = 'triangle'; o2.frequency.value = 82.5;
      lfo.type = 'sine'; lfo.frequency.value = 4.5;
      lfoG.gain.value = 12;
      lfo.connect(lfoG); lfoG.connect(o1.frequency);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(0.07, t0 + 0.2);
      o1.connect(g); o2.connect(g); g.connect(master);
      o1.start(t0); o2.start(t0); lfo.start(t0);
      magnetNodes = { o1, o2, lfo, g };
    }

    function stopMagnetHum() {
      if (!magnetNodes || !ctx) return;
      const t0 = ctx.currentTime;
      try {
        magnetNodes.g.gain.cancelScheduledValues(t0);
        magnetNodes.g.gain.setValueAtTime(Math.max(0.0001, magnetNodes.g.gain.value), t0);
        magnetNodes.g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.15);
        magnetNodes.o1.stop(t0 + 0.2);
        magnetNodes.o2.stop(t0 + 0.2);
        magnetNodes.lfo.stop(t0 + 0.2);
      } catch (_) {}
      magnetNodes = null;
    }

    function tickMagnet(active) {
      if (!active) {
        if (magnetNodes) stopMagnetHum();
        return;
      }
      if (!magnetNodes && enabled) startMagnetHum();
    }

    // unlock on first gesture + start menu music
    const unlock = () => {
      ensure();
      if (enabled && (state === 'menu' || !state)) startBGM('menu');
    };
    window.addEventListener('pointerdown', unlock, { once: true });
    window.addEventListener('keydown', unlock, { once: true });

    return {
      play, setEnabled, isEnabled, ensure, tickMagnet, stopMagnetHum,
      startBGM, stopBGM, pauseBGM, resumeBGM
    };
  })();

  // ─── Selection state ──────────────────────────────────────
  let selectedStyle = localStorage.getItem('bb_style') || 'neon';
  let selectedSkin = localStorage.getItem('bb_skin') || 'classic';
  let gameMode = localStorage.getItem('bb_mode') || 'solo'; // solo | team
  if (!THEMES[selectedStyle]) selectedStyle = 'neon';
  if (!SKINS[selectedSkin]) selectedSkin = 'classic';
  if (gameMode !== 'solo' && gameMode !== 'team') gameMode = 'solo';

  const MODES = {
    solo: { id: 'solo', name: '竞技模式', desc: '各自为战，人人可吞' },
    team: { id: 'team', name: '团队模式', desc: '组队协作，队友不互食' }
  };

  function applyThemeClass() {
    document.body.className = 'theme-' + selectedStyle;
  }
  applyThemeClass();

  function buildPickers() {
    const modeBox = document.getElementById('mode-picks');
    modeBox.innerHTML = Object.values(MODES).map(m => `
      <div class="pick${m.id === gameMode ? ' active' : ''}" data-mode="${m.id}">
        <div class="name">${m.name}</div>
        <div class="desc">${m.desc}</div>
      </div>
    `).join('');
    modeBox.querySelectorAll('.pick').forEach(el => {
      el.addEventListener('click', () => {
        gameMode = el.dataset.mode;
        localStorage.setItem('bb_mode', gameMode);
        modeBox.querySelectorAll('.pick').forEach(p => p.classList.toggle('active', p.dataset.mode === gameMode));
      });
    });

    const styleBox = document.getElementById('style-picks');
    styleBox.innerHTML = Object.values(THEMES).map(th => `
      <div class="pick${th.id === selectedStyle ? ' active' : ''}" data-style="${th.id}">
        <div class="swatch" style="background:${th.swatch}"></div>
        <div class="name">${th.name}</div>
        <div class="desc">${th.desc}</div>
      </div>
    `).join('');
    styleBox.querySelectorAll('.pick').forEach(el => {
      el.addEventListener('click', () => {

    const skinBox = document.getElementById('skin-picks');
    skinBox.innerHTML = Object.values(SKINS).map(sk => `
      <div class="pick${sk.id === selectedSkin ? ' active' : ''}" data-skin="${sk.id}">
        <div class="swatch" style="background:radial-gradient(circle at 35% 30%,#fff8,${sk.color} 55%,#0006)"></div>
        <div class="name">${sk.name}</div>
        <div class="desc">${sk.desc}</div>
      </div>
    `).join('');
    skinBox.querySelectorAll('.pick').forEach(el => {
      el.addEventListener('click', () => {
        selectedSkin = el.dataset.skin;
        localStorage.setItem('bb_skin', selectedSkin);
        skinBox.querySelectorAll('.pick').forEach(p => p.classList.toggle('active', p.dataset.skin === selectedSkin));
      });
    });
  }
  buildPickers();

  // ─── Game state ───────────────────────────────────────────
  let state = 'menu';
  let playerName = '冒险者';
  let foods = [];
  let viruses = [];
  let ejects = [];
  let particles = [];
  let rings = [];
  let trails = [];
  let floats = [];
  let bots = [];
  let player = null;
  let cam = { x: WORLD / 2, y: WORLD / 2, z: 1, shake: 0 };
  let keys = new Set();
  let lastT = 0;
  let toastTimer = 0;
  let spawnProtection = 0;
  let time = 0;
  let moveDir = { x: 0, y: 0 };   // current intended direction (for skills / HUD)
  let coastDir = { x: 0, y: 0 };  // last set direction; coast at constant velocity when idle
  let coasting = false;           // true after any WASD until brake
  let cooldowns = { l: 0, i: 0, o: 0, h: 0, n: 0, g: 0 };
  let shieldT = 0;
  let dashT = 0;
  let brakeT = 0;
  let magnetT = 0;
  // split/eject hold cadence (prevents 1 keypress → multi-frame cascade looking like 1→3)
  let lastSplitAt = 0;
  let lastEjectAt = 0;
  const SPLIT_HOLD_GAP = 0.14; // seconds between held splits; each is still pure 1→2
  const EJECT_HOLD_GAP = 0.04;

  // ─── Entities ─────────────────────────────────────────────
  function makeCell(x, y, mass, color, name, ownerId, isPlayer, skinId) {
    return {
      x, y, mass,
      r: massToR(mass),
      displayR: massToR(mass),
      vx: 0, vy: 0,
      color, name,
      ownerId,
      isPlayer: !!isPlayer,
      skinId: skinId || null,
      born: performance.now() / 1000,
      mergeAt: 0,
      boost: 0,
      squash: 0,
      pulse: 0,
      trailT: 0
    };
  }

  function makePlayer(name) {
    const skin = SKINS[selectedSkin];
    const color = skin.color;
    const id = 'p0';
    const cx = WORLD / 2 + rand(-200, 200);
    const cy = WORLD / 2 + rand(-200, 200);
    return {
      id, name, color, skinId: selectedSkin,
      teamId: -1, // player is never allied with AI
      cells: [makeCell(cx, cy, PLAYER_START_MASS, color, name, id, true, selectedSkin)],
      score: 0,
      maxMass: PLAYER_START_MASS,
      kills: 0,
      startTime: performance.now() / 1000,
      alive: true
    };
  }

  // Prefer map corners / edges, never near a death spot
  function pickSpawnPoint(avoidX, avoidY) {
    const margin = 380;
    const spots = [
      [margin, margin],
      [WORLD - margin, margin],
      [margin, WORLD - margin],
      [WORLD - margin, WORLD - margin],
      [WORLD * 0.5, margin],
      [WORLD * 0.5, WORLD - margin],
      [margin, WORLD * 0.5],
      [WORLD - margin, WORLD * 0.5],
      [WORLD * 0.25, WORLD * 0.25],
      [WORLD * 0.75, WORLD * 0.25],
      [WORLD * 0.25, WORLD * 0.75],
      [WORLD * 0.75, WORLD * 0.75]
    ].map(([sx, sy]) => [
      clamp(sx + rand(-120, 120), 200, WORLD - 200),
      clamp(sy + rand(-120, 120), 200, WORLD - 200)
    ]);

    // shuffle
    for (let i = spots.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      [spots[i], spots[j]] = [spots[j], spots[i]];
    }

    const minDist = 1400;
    if (avoidX != null && avoidY != null) {
      for (const [sx, sy] of spots) {
        if (dist(sx, sy, avoidX, avoidY) >= minDist) return { x: sx, y: sy };
      }
      // farthest corner fallback
      let best = spots[0], bestD = -1;
      for (const [sx, sy] of spots) {
        const d = dist(sx, sy, avoidX, avoidY);
        if (d > bestD) { bestD = d; best = [sx, sy]; }
      }
      return { x: best[0], y: best[1] };
    }
    const [sx, sy] = spots[0];
    return { x: sx, y: sy };
  }

  function makeBot(i, opts = {}) {
    const solo = gameMode === 'solo';
    // solo: unique team per bot; team: shared team clusters
    const teamId = solo ? (1000 + i) : (i % TEAM_COUNT);
    const color = solo ? pick(COLORS.slice(1)) : TEAM_COLORS[teamId];
    const baseName = BOT_NAMES[i % BOT_NAMES.length];
    const name = solo ? baseName : (TEAM_NAMES[teamId] + '·' + baseName);
    const id = 'b' + i;

    let x, y;
    if (opts.avoidX != null && opts.avoidY != null) {
      // respawn after death: far from death point, preferably another corner
      ({ x, y } = pickSpawnPoint(opts.avoidX, opts.avoidY));
    } else if (solo) {
      ({ x, y } = pickSpawnPoint(null, null));
    } else {
      // team mode initial: loose cluster, still near map zones
      const clusterX = 600 + (teamId % 4) * (WORLD - 1200) / 3 + rand(-180, 180);
      const clusterY = 600 + Math.floor(teamId / 4) * (WORLD - 1200) / 2 + rand(-180, 180);
      x = clamp(clusterX, 200, WORLD - 200);
      y = clamp(clusterY, 200, WORLD - 200);
    }

    const mass = rand(40, 95);
    const botSkins = ['classic', 'metal', 'flame', 'ice', 'ghost', 'planet', 'rainbow', 'eye'];
    const skinId = pick(botSkins);
    const role = i % 3; // 0 hunter, 1 farmer, 2 support
    return {
      id, name, color, skinId, teamId, role,
      cells: [makeCell(x, y, mass, color, name, id, false, skinId)],
      target: null,
      thinkT: 0,
      aggression: rand(0.72, 1.2),
      skill: rand(0.85, 1.35),
      alive: true,
      growthBonus: rand(2.1, 3.0),
      deathX: null,
      deathY: null
    };
  }

  function spawnFood(n) {
    for (let i = 0; i < n; i++) {
      foods.push({
        x: rand(40, WORLD - 40),
        y: rand(40, WORLD - 40),
        mass: FOOD_MASS,
        r: 3.2 + Math.random() * 2.2,
        color: pick(COLORS),
        pulse: Math.random() * Math.PI * 2,
        spin: Math.random() * Math.PI * 2
      });
    }
  }

  function spawnVirus(n) {
    for (let i = 0; i < n; i++) {
      viruses.push({
        x: rand(300, WORLD - 300),
        y: rand(300, WORLD - 300),
        mass: VIRUS_MASS,
        r: massToR(VIRUS_MASS),
        spin: Math.random() * Math.PI * 2
      });
    }
  }

  function totalMass(entity) {
    return entity.cells.reduce((s, c) => s + c.mass, 0);
  }

  function centroid(entity) {
    let mx = 0, my = 0, m = 0;
    for (const c of entity.cells) {
      mx += c.x * c.mass;
      my += c.y * c.mass;
      m += c.mass;
    }
    if (m <= 0) return { x: cam.x, y: cam.y };
    return { x: mx / m, y: my / m };
  }

  // ─── FX ───────────────────────────────────────────────────
  function spawnParticles(x, y, color, n, speed = 160) {
    for (let i = 0; i < n; i++) {
      const ang = rand(0, Math.PI * 2);
      const sp = rand(speed * 0.3, speed);
      particles.push({
        x, y,
        vx: Math.cos(ang) * sp,
        vy: Math.sin(ang) * sp,
        life: rand(0.25, 0.75),
        max: 0.75,
        r: rand(2, 6),
        color,
        drag: rand(0.88, 0.95)
      });
    }
  }

  function spawnRing(x, y, color, maxR, life = 0.45) {
    rings.push({ x, y, color, r: 4, maxR, life, maxLife: life, width: 3 });
  }

  function spawnFloat(x, y, text, color) {
    floats.push({ x, y, text, color, life: 0.9, vy: -40 });
  }

  function addTrail(cell) {
    if (cell.trailT > 0) return;
    cell.trailT = 0.03;
    trails.push({
      x: cell.x, y: cell.y,
      r: cell.displayR * 0.85,
      color: cell.color,
      life: 0.35,
      max: 0.35
    });
  }

  // ─── Lifecycle ────────────────────────────────────────────
  function resetWorld() {
    foods = []; viruses = []; ejects = [];
    particles = []; rings = []; trails = []; floats = [];
    bots = [];
    cooldowns = { l: 0, i: 0, o: 0, h: 0, n: 0, g: 0 };
    shieldT = 0; dashT = 0; brakeT = 0; magnetT = 0;
    spawnFood(FOOD_COUNT);
    spawnVirus(VIRUS_COUNT);
    for (let i = 0; i < BOT_COUNT; i++) bots.push(makeBot(i));
    player = makePlayer(playerName);
    const c = centroid(player);
    cam.x = c.x; cam.y = c.y; cam.z = 1; cam.shake = 0;
    spawnProtection = 2.5;
    lastT = performance.now();
    moveDir = { x: 0, y: 0 };
    coastDir = { x: 0, y: 0 };
    coasting = false;
    lastSplitAt = 0;
    lastEjectAt = 0;
  }

  function startGame() {
    playerName = (nameInput.value || '冒险者').trim().slice(0, 12) || '冒险者';
    SFX.ensure();
    resetWorld();
    state = 'play';
    startScreen.style.display = 'none';
    endScreen.style.display = 'none';
    SFX.play('start');
    SFX.startBGM('game');
    const modeEl = document.getElementById('hud-mode-label');
    if (modeEl) modeEl.textContent = gameMode === 'team' ? '团队' : '竞技';
    showToast(gameMode === 'team' ? '团队模式' : '竞技模式', '', 1.2);
  }

  function gameOver(reason) {
    if (state !== 'play') return;
    state = 'dead';
    player.alive = false;
    SFX.stopMagnetHum();
    SFX.startBGM('menu');
    SFX.play('death');
    if (player.cells.length) {
      const c = centroid(player);
      spawnParticles(c.x, c.y, player.color, 40, 280);
      spawnRing(c.x, c.y, player.color, 120, 0.7);
    }
    cam.shake = 14;
    const t = performance.now() / 1000 - player.startTime;
    document.getElementById('end-title').textContent = reason || '被吞食了';
    document.getElementById('end-desc').textContent = '';
    document.getElementById('end-mass').textContent = Math.floor(player.maxMass);
    document.getElementById('end-score').textContent = Math.floor(player.score);
    document.getElementById('end-time').textContent = formatTime(t);
    document.getElementById('end-kills').textContent = player.kills;

  function showToast(big, sub, sec) {

    toastSub.textContent = sub || '';
    toastEl.classList.add('show');
    toastTimer = sec;
  }

  // ─── Input ────────────────────────────────────────────────
  window.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (['w','a','s','d','j','k','l','u','i','o','h','n','g',' ','escape','r'].includes(k)) e.preventDefault();
    keys.add(k);

    if (state === 'play') {
      // J / U / K: fire once on press; hold repeats in update with a small gap
      // (avoids keydown + same-frame hold both firing → one ball becoming 3)
      if (k === 'j') { useSkill('j'); lastSplitAt = performance.now() / 1000; }
      if (k === 'u') { useSkill('u'); lastSplitAt = performance.now() / 1000; }
      if (k === 'k') { useSkill('k'); lastEjectAt = performance.now() / 1000; }
      if (k === 'l') useSkill('l');
      if (k === 'g') useSkill('g');
      if (k === 'i') useSkill('i');
      if (k === 'o') useSkill('o');
      if (k === 'h') useSkill('h');
      if (k === 'n') useSkill('n');
      if (k === 'm') {
        // mute hotkey

        syncSoundBtn(on);
      }
      if (k === 'escape') {
        state = 'pause';
        SFX.play('pause');
        SFX.stopMagnetHum();
        SFX.pauseBGM();
        showToast('暂停', 'Esc 继续', 999);
      }
    } else if (state === 'pause' && k === 'escape') {
      state = 'play';
      SFX.play('resume');
      SFX.resumeBGM();
      toastEl.classList.remove('show');
      toastTimer = 0;
    } else if (state === 'dead' && k === 'r') {
      startGame();
    }
  });
  window.addEventListener('keyup', (e) => keys.delete(e.key.toLowerCase()));

  function syncSoundBtn(on) {
    const btn = document.getElementById('btn-sound');
    if (!btn) return;
    btn.textContent = on ? '音效' : '静音';
    btn.classList.toggle('on', on);
  }
  syncSoundBtn(SFX.isEnabled());
  document.getElementById('btn-sound').addEventListener('click', (e) => {
    e.stopPropagation();
    SFX.ensure();
    const on = SFX.setEnabled(!SFX.isEnabled());
    syncSoundBtn(on);
    if (on) SFX.play('ui');
  });

  document.getElementById('btn-start').addEventListener('click', startGame);
  document.getElementById('btn-again').addEventListener('click', startGame);
  document.getElementById('btn-menu').addEventListener('click', () => {
    endScreen.style.display = 'none';
    startScreen.style.display = 'grid';
    state = 'menu';
    SFX.startBGM('menu');

  nameInput.addEventListener('keydown', (e) => {
