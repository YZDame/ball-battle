  function flashSkill(key) {
    const el = skillEls[key];
    if (!el) return;
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
  }

  function useSkill(key) {
    if (!player || !player.alive) return;
    if (!NO_CD_SKILLS.has(key) && cooldowns[key] > 0) return;

    if (key === 'j') {
      if (!trySplit(player)) return;
      SFX.play('split');
      flashSkill('j');
    } else if (key === 'k') {
      if (!tryEject(player)) return;
      SFX.play('eject');
      flashSkill('k');
    } else if (key === 'l') {
      brakeT = 0.45;
      coasting = false;
      coastDir = { x: 0, y: 0 };
      moveDir = { x: 0, y: 0 };
      for (const c of player.cells) {
        c.vx = 0;
        c.vy = 0;
        c.boost = 0;
        spawnRing(c.x, c.y, '#e2e8f0', c.r * 1.8, 0.3);
      }
      SFX.play('brake');
      flashSkill('l');
      cooldowns.l = COOLDOWN.l;
    } else if (key === 'u') {
      // binary split on largest cell only (same as J, longer boost) — no CD
      if (!trySplit(player, { boost: 28 })) return;
      const c = centroid(player);
      spawnRing(c.x, c.y, player.color, 70, 0.35);
      SFX.play('split');
      flashSkill('u');
    } else if (key === 'g') {
      if (player.cells.length < 2) return;
      forceMerge(player);
      SFX.play('eat');
      flashSkill('g');
      cooldowns.g = COOLDOWN.g;
    } else if (key === 'i') {
      // dash: cost mass, burst speed along move dir
      let dx = moveDir.x, dy = moveDir.y;
      if (dx === 0 && dy === 0) {
        // face last velocity
        const c0 = player.cells[0];
        dx = c0.vx; dy = c0.vy;
      }
      const len = Math.hypot(dx, dy);
      if (len < 0.01) return;
      dx /= len; dy /= len;
      let costed = false;
      for (const c of player.cells) {
        if (c.mass < 20) continue;
        c.mass = Math.max(10, c.mass * 0.92);
        c.r = massToR(c.mass);
        c.vx = dx * 16;
        c.vy = dy * 16;
        c.boost = 18;
        c.squash = 0.35;
        spawnParticles(c.x, c.y, c.color, 10, 200);
        spawnRing(c.x, c.y, c.color, c.r * 2.2, 0.28);
        costed = true;
      }
      if (!costed) return;
      // dash also locks cruise direction
      coastDir.x = dx; coastDir.y = dy;
      moveDir.x = dx; moveDir.y = dy;
      coasting = true;
      dashT = 0.45;
      cam.shake = 4;
      SFX.play('dash');
      flashSkill('i');
      cooldowns.i = COOLDOWN.i;
    } else if (key === 'o') {
      shieldT = 2.2;
      spawnProtection = Math.max(spawnProtection, 2.2);
      for (const c of player.cells) {
        spawnRing(c.x, c.y, '#5eead4', c.r * 2.5, 0.5);
      }
      SFX.play('shield');
      flashSkill('o');
      cooldowns.o = COOLDOWN.o;
    } else if (key === 'h') {
      magnetT = 5.0;
      const c = centroid(player);
      spawnRing(c.x, c.y, '#a78bfa', MAGNET_RANGE_BASE, 0.55);
      spawnParticles(c.x, c.y, '#c4b5fd', 20, 140);
      SFX.play('magnet');
      flashSkill('h');
      cooldowns.h = COOLDOWN.h;
    } else if (key === 'n') {
      let grew = false;
      for (const c of player.cells) {
        const before = c.mass;
        c.mass = Math.max(before + 28, before * (1 + EXPAND_BONUS));
        c.r = massToR(c.mass);
        c.pulse = 1;
        c.squash = 0.45;
        spawnRing(c.x, c.y, c.color, c.r * 2.4, 0.45);
        spawnParticles(c.x, c.y, c.color, 16, 180);
        spawnFloat(c.x, c.y - c.r, '+' + Math.floor(c.mass - before), '#f0c14b');
        grew = true;
      }
      if (!grew) return;
      player.maxMass = Math.max(player.maxMass, totalMass(player));
      player.score += 30;
      cam.shake = 7;
      SFX.play('expand');
      flashSkill('n');
      cooldowns.n = COOLDOWN.n;
    }
  }

  function magnetRange() {
    if (!player || !player.alive) return MAGNET_RANGE_BASE;
    return MAGNET_RANGE_BASE + Math.sqrt(totalMass(player)) * 10;
  }

  function applyMagnet(dt) {
    if (magnetT <= 0 || !player || !player.alive) return;
    const c = centroid(player);
    const range = magnetRange();
    const myMass = totalMass(player);
    const pullFood = 220;
    const pullCell = 140;

    for (const f of foods) {
      const d = dist(c.x, c.y, f.x, f.y);
      if (d < 1 || d > range) continue;
      const str = pullFood * (1 - d / range) * dt;
      f.x += (c.x - f.x) / d * str;
      f.y += (c.y - f.y) / d * str;
    }

    for (const e of ejects) {
      const d = dist(c.x, c.y, e.x, e.y);
      if (d < 1 || d > range) continue;
      const str = pullFood * 0.9 * (1 - d / range) * dt;
      e.x += (c.x - e.x) / d * str;
      e.y += (c.y - e.y) / d * str;
      e.vx *= 0.9;
      e.vy *= 0.9;
    }

    for (const bot of bots) {
      if (!bot.alive) continue;
      for (const cell of bot.cells) {
        if (cell.mass >= myMass * 0.95) continue;
        const d = dist(c.x, c.y, cell.x, cell.y);
        if (d < 1 || d > range) continue;
        const str = pullCell * (1 - d / range) * dt * (myMass / (cell.mass + 20));
        const nx = (c.x - cell.x) / d;
        const ny = (c.y - cell.y) / d;
        cell.x += nx * str;
        cell.y += ny * str;
        cell.vx += nx * str * 0.08;
        cell.vy += ny * str * 0.08;
      }
    }

    // occasional magnet sparkles
    if (Math.random() < 0.25) {
      const a = rand(0, Math.PI * 2);
      const rr = rand(range * 0.35, range * 0.95);
      spawnParticles(c.x + Math.cos(a) * rr, c.y + Math.sin(a) * rr, '#c4b5fd', 1, 40);
    }
  }

  function updateSkillHUD() {
    // no-CD skills: ready when action is still possible
    const canSplit = player && player.alive
      && player.cells.length < MAX_CELLS
      && player.cells.some(c => c.mass >= MIN_SPLIT_MASS);
    const canEject = player && player.alive
      && player.cells.some(c => c.mass >= EJECT_COST + 8);

    for (const key of Object.keys(skillEls)) {
      const el = skillEls[key];
      if (!el) continue;
      const mask = el.querySelector('.cd');

      if (key === 'j' || key === 'u') {
        el.classList.toggle('ready', !!canSplit);
        el.classList.toggle('on-cd', !canSplit);
        if (!canSplit) mask.textContent = player && player.cells.length >= MAX_CELLS ? 'MAX' : '—';
        continue;
      }
      if (key === 'k') {
        el.classList.toggle('ready', !!canEject);
        el.classList.toggle('on-cd', !canEject);
        if (!canEject) mask.textContent = '—';
        continue;
      }

      const cd = cooldowns[key] || 0;
      if (cd > 0) {
        el.classList.add('on-cd');
        el.classList.remove('ready');
        mask.textContent = cd < 1 ? cd.toFixed(1) : String(Math.ceil(cd));
      } else {
        el.classList.remove('on-cd');
        el.classList.add('ready');
      }
    }
  }

  // ─── Actions ──────────────────────────────────────────────
  // Strict binary split: pick ONE eligible large cell → exactly two pieces.
  // Small cells (mass < MIN_SPLIT_MASS) are never touched.
  // Never splits multiple cells in one call.
  function trySplit(entity, opts = {}) {
    if (!entity || !entity.alive) return false;
    if (entity.cells.length >= MAX_CELLS) return false;
    const now = performance.now() / 1000;
    const boost = opts.boost != null ? opts.boost : 22;

    // only the single largest cell that is big enough to half cleanly
    let cell = null;
    for (const c of entity.cells) {
      if (c.mass < MIN_SPLIT_MASS) continue;
      if (c.mass / 2 < MIN_CELL_MASS) continue;
      if (!cell || c.mass > cell.mass) cell = c;
    }
    if (!cell) return false;

    const half = cell.mass / 2;
    cell.mass = half;
    cell.r = massToR(half);
    cell.displayR = cell.r;
    cell.squash = 0.4;

    let ang;
    if (entity === player) {
      if (Math.hypot(moveDir.x, moveDir.y) > 0.1) {
        ang = Math.atan2(moveDir.y, moveDir.x);
      } else {
        ang = Math.atan2(cell.vy, cell.vx) || rand(0, Math.PI * 2);
      }
    } else {
      ang = Math.atan2(cell.vy, cell.vx) || rand(0, Math.PI * 2);
    }

    const nc = makeCell(
      cell.x + Math.cos(ang) * cell.r * 0.25,
      cell.y + Math.sin(ang) * cell.r * 0.25,
      half, cell.color, cell.name, entity.id, entity === player, entity.skinId
    );
    nc.boost = boost;
    nc.vx = Math.cos(ang) * boost;
    nc.vy = Math.sin(ang) * boost;
    nc.mergeAt = now + MERGE_DELAY;
    nc.squash = 0.5;
    // both halves share recombine lock; no second split in this same action
    cell.mergeAt = now + MERGE_DELAY;
    entity.cells.push(nc);
    spawnRing(cell.x, cell.y, cell.color, cell.r * 1.6, 0.25);
    spawnParticles(cell.x, cell.y, cell.color, 6, 120);
    return true;
  }

  function tryEject(entity) {
    if (!entity || !entity.alive) return false;
    let did = false;
    for (const cell of entity.cells) {
      if (cell.mass < EJECT_COST + 8) continue;
      cell.mass -= EJECT_COST;
      cell.r = massToR(cell.mass);
      cell.squash = 0.2;

      let ang;
      if (entity === player) {
        if (Math.hypot(moveDir.x, moveDir.y) > 0.1) {
          ang = Math.atan2(moveDir.y, moveDir.x);
        } else {
          ang = Math.atan2(cell.vy || 0.01, cell.vx || 0.01);
        }
      } else {
        ang = Math.atan2(cell.vy || 0.01, cell.vx || 0.01);
      }

      // short throw — land close to the body, not across the map
      const ex = cell.x + Math.cos(ang) * (cell.r + 4);
      const ey = cell.y + Math.sin(ang) * (cell.r + 4);
      ejects.push({
        x: ex, y: ey,
        vx: Math.cos(ang) * 7.5,
        vy: Math.sin(ang) * 7.5,
        mass: EJECT_MASS,
        r: massToR(EJECT_MASS),
        color: cell.color,
        skinId: entity.skinId || cell.skinId || 'classic',
        life: 5.5,
        ownerId: entity.id,
        spin: rand(0, Math.PI * 2)
      });
      did = true;
    }
    return did;
  }

  // ─── AI ───────────────────────────────────────────────────
  function isAlly(a, b) {
    if (!a || !b) return false;
    if (a === b) return true;
    if (gameMode === 'solo') return false;
    if (a.teamId == null || b.teamId == null) return false;
    if (a.teamId < 0 || b.teamId < 0) return false;
    return a.teamId === b.teamId;
  }

  function teamMates(bot) {
    return bots.filter(b => b.alive && b !== bot && b.teamId === bot.teamId);
  }

  function teamCentroid(teamId) {
    let mx = 0, my = 0, m = 0;
    for (const b of bots) {
      if (!b.alive || b.teamId !== teamId) continue;
      const c = centroid(b);
      const tm = totalMass(b);
      mx += c.x * tm; my += c.y * tm; m += tm;
    }
    if (m <= 0) return null;
    return { x: mx / m, y: my / m, mass: m };
  }

  // Immediate local awareness: closest edible prey & deadly threat
  function scanNearby(bot, range) {
    const c = centroid(bot);
    const myMass = totalMass(bot);
    let prey = null, preyScore = -Infinity;
    let threat = null, threatD = Infinity;

    const consider = (entity) => {
      if (!entity || entity === bot || !entity.alive) return;
      if (isAlly(bot, entity)) return;
      if (entity === player && (spawnProtection > 0 || shieldT > 0)) return;
      for (const cell of entity.cells) {
        const d = dist(c.x, c.y, cell.x, cell.y);
        if (d > range) continue;
        // edible: we are clearly bigger
        if (myMass > cell.mass * 1.12 || cell.mass < myMass * 0.88) {
          if (myMass > cell.mass * 1.12) {
            // prioritize close + juicy small cells (esp. player fragments)
            const score = (cell.mass * 2.2) / (d + 25) + (range - d) * 0.02
              + (entity === player ? 40 : 0)
              + (cell.mass < myMass * 0.45 ? 25 : 0);
            if (score > preyScore) {
              preyScore = score;
              prey = { x: cell.x, y: cell.y, mass: cell.mass, r: cell.r, d, entity, cell };
            }
          }
        }
        if (cell.mass > myMass * 1.08) {
          if (d < threatD) {
            threatD = d;
            threat = { x: cell.x, y: cell.y, mass: cell.mass, r: cell.r, d };
          }
        }
      }
    };

    consider(player);
    for (const b of bots) consider(b);
    return { prey, threat, myMass, c };
  }

  function updateBot(bot, dt) {
    bot.thinkT -= dt;
    if (bot.thinkT <= 0 || !bot.target) {
      bot.thinkT = rand(0.08, 0.22) / bot.skill;
      bot.target = chooseBotTarget(bot);
    }

    const c = centroid(bot);
    const myMass = totalMass(bot);
    // close-range scan every frame — no mindless wandering near prey
    const local = scanNearby(bot, 820 + bot.skill * 100);
    let tx, ty;
    let mode = 'idle';

    // 1) Flee larger balls first (survival)
    if (local.threat && local.threat.d < local.threat.r + 300 + bot.skill * 50) {
      mode = 'flee';
      tx = c.x - (local.threat.x - c.x);
      ty = c.y - (local.threat.y - c.y);
      if (gameMode === 'team') {
        const tc = teamCentroid(bot.teamId);
        if (tc && dist(c.x, c.y, tc.x, tc.y) < 1000) {
          tx = lerp(tx, tc.x, 0.3);
          ty = lerp(ty, tc.y, 0.3);
        }
      }
    }
    // 2) Chase any edible nearby cell (especially small fragments)
    else if (local.prey && local.prey.d < 780) {
      mode = 'hunt';
      // lead the target a bit using its velocity
      const lead = 10 + local.prey.d * 0.05;
      tx = local.prey.x + (local.prey.cell.vx || 0) * lead;
      ty = local.prey.y + (local.prey.cell.vy || 0) * lead;
      bot.target = { x: tx, y: ty, kind: 'prey' };
    }
    // 3) Fall back to planned target (food / distant prey / team)
    else {
      if (!bot.target) bot.target = chooseBotTarget(bot);
      tx = bot.target.x;
      ty = bot.target.y;
      mode = bot.target.kind || 'idle';
    }

    // virus avoidance when large
    if (myMass > VIRUS_MASS * 1.2 && bot.cells.length < MAX_CELLS - 1) {
      for (const v of viruses) {
        const d = dist(c.x, c.y, v.x, v.y);
        if (d < v.r + 150) {
          tx = c.x - (v.x - c.x);
          ty = c.y - (v.y - c.y);
          mode = 'avoid';
          break;
        }
      }
    }

    // team support
    if (gameMode === 'team' && mode !== 'flee' && (bot.role === 2 || bot.aggression > 0.9)) {
      for (const ally of teamMates(bot)) {
        const ac = centroid(ally);
        const scan = scanNearby(ally, 400);
        if (scan.threat && scan.threat.d < scan.threat.r + 180) {
          if (myMass > scan.threat.mass * 1.12) {
            tx = scan.threat.x; ty = scan.threat.y; mode = 'hunt';
          } else {
            tx = ac.x + (ac.x - scan.threat.x) * 0.25;
            ty = ac.y + (ac.y - scan.threat.y) * 0.25;
          }
          break;
        }
      }
    }

    const spMul = 1 + (bot.skill - 1) * 0.18 + (mode === 'hunt' ? 0.1 : 0) + (mode === 'flee' ? 0.12 : 0);
    for (const cell of bot.cells) {
      const ang = Math.atan2(ty - cell.y, tx - cell.x);
      // each cell uses its own mass speed
      const sp = speedOf(cell.mass) * spMul;
      const blend = mode === 'flee' || mode === 'hunt' ? 0.22 * bot.skill : 0.14 * bot.skill;
      cell.vx = lerp(cell.vx, Math.cos(ang) * sp, clamp(blend, 0.08, 0.35));
      cell.vy = lerp(cell.vy, Math.sin(ang) * sp, clamp(blend, 0.08, 0.35));
    }

    // more aggressive split while hunting
    if (mode === 'hunt' && local.prey && local.prey.d < 320 && local.prey.d > 40) {
      if (myMass > local.prey.mass * 1.35 && Math.random() < 0.022 * bot.aggression * bot.skill) {
        trySplit(bot);
      }
    }
    // opportunistic second split when much larger
    if (mode === 'hunt' && local.prey && myMass > local.prey.mass * 2.2 && Math.random() < 0.008 * bot.skill) {
      trySplit(bot);
    }

    // faster passive growth — AI races hard
    for (const cell of bot.cells) {
      cell.mass += (1.15 + bot.growthBonus * 0.55) * dt * (1 + Math.min(2, myMass / 160) * 0.2);
      cell.r = massToR(cell.mass);
    }
  }

  function nearestThreat(bot) {
    return scanNearby(bot, 900).threat;
  }

  function chooseBotTarget(bot) {
    const c = centroid(bot);
    const myMass = totalMass(bot);
    let best = null, bestScore = -Infinity;
    const huntMul = bot.role === 0 ? 1.75 : bot.role === 2 ? 1.35 : 1.05;
    const farmMul = bot.role === 1 ? 1.55 : 0.95;

    // always prefer any edible enemy cell in wide range (strategic hunt)
    const wide = scanNearby(bot, 1600);
    if (wide.prey) {
      const score = 2600 / (wide.prey.d + 16) * huntMul * bot.aggression
        + wide.prey.mass * 0.28
        + (wide.prey.entity === player ? 80 : 0);
      if (score > bestScore) {
        bestScore = score;
        best = { x: wide.prey.x, y: wide.prey.y, kind: 'prey' };
      }
    }

    if (gameMode === 'team') {
      for (const ally of teamMates(bot)) {
        if (ally.target && ally.target.kind === 'prey') {
          const d = dist(c.x, c.y, ally.target.x, ally.target.y);
          if (d < 1200) {
            const score = 900 / (d + 40) * bot.aggression * huntMul + 50;
            if (score > bestScore) {
              bestScore = score;
              best = { x: ally.target.x, y: ally.target.y, kind: 'prey', shared: true };
            }
          }
        }
      }
    }

    // food only if no good prey
    if (bestScore < 30) {
      let fx = 0, fy = 0, fn = 0;
      const scanR = bot.role === 1 ? 800 : 600;
      for (let i = 0; i < foods.length; i += 2) {
        const f = foods[i];
        if (dist(c.x, c.y, f.x, f.y) < scanR) {
          fx += f.x; fy += f.y; fn++;
        }
      }
      if (fn > 0) {
        const score = (100 + fn * 8) * farmMul;
        if (score > bestScore) best = { x: fx / fn, y: fy / fn, kind: 'food' };
      }
    }

    if (gameMode === 'team' && bestScore < 20) {
      const tc = teamCentroid(bot.teamId);
      if (tc) {
        const d = dist(c.x, c.y, tc.x, tc.y);
        if (d > 650) best = { x: tc.x, y: tc.y, kind: 'regroup' };
      }
    }

    if (!best) {
      // short purposeful roam toward denser food, not pure random
      const a = rand(0, Math.PI * 2);
      const rr = rand(200, 500);
      best = { x: clamp(c.x + Math.cos(a) * rr, 100, WORLD - 100), y: clamp(c.y + Math.sin(a) * rr, 100, WORLD - 100), kind: 'wander' };
    }
    return best;
  }

  // ─── Physics ──────────────────────────────────────────────
  function moveCells(entity, dt) {
    const now = performance.now() / 1000;
    for (const cell of entity.cells) {
      if (cell.boost > 0) cell.boost = Math.max(0, cell.boost - 32 * dt);
      if (cell.squash > 0) cell.squash = Math.max(0, cell.squash - dt * 2.2);
      if (cell.trailT > 0) cell.trailT -= dt;
      if (cell.pulse > 0) cell.pulse = Math.max(0, cell.pulse - dt * 3);

      // cap residual boost speed by mass so big pieces don't keep flying as fast as small ones
      if (cell.boost <= 0.5) {
        const cap = speedOf(cell.mass) * 1.35;
        const spd = Math.hypot(cell.vx, cell.vy);
        if (spd > cap) {
          cell.vx *= cap / spd;
          cell.vy *= cap / spd;
        }
      }

      cell.x += cell.vx * 60 * dt;
      cell.y += cell.vy * 60 * dt;
      cell.x = clamp(cell.x, cell.r, WORLD - cell.r);
      cell.y = clamp(cell.y, cell.r, WORLD - cell.r);
      cell.r = massToR(cell.mass);
      cell.displayR = lerp(cell.displayR, cell.r * (1 + cell.pulse * 0.15), 0.2);

      const spd = Math.hypot(cell.vx, cell.vy);
      if (spd > 1.2 || cell.boost > 0.5) addTrail(cell);

      if (cell.mass > 350) {
        cell.mass -= cell.mass * 0.00035 * dt * 60 * 0.016;
      }
    }

    for (let i = 0; i < entity.cells.length; i++) {
      for (let j = i + 1; j < entity.cells.length; j++) {
        const a = entity.cells[i], b = entity.cells[j];
        const canMerge = now >= a.mergeAt && now >= b.mergeAt;
        const dx = b.x - a.x, dy = b.y - a.y;
        const d = Math.hypot(dx, dy) || 0.01;
        // After recombine timer: allow overlap (don't push apart hard)
        const minD = canMerge
          ? Math.max(a.r, b.r) * 0.55
          : a.r + b.r;
        if (d < minD) {
          const push = (minD - d) * (canMerge ? 0.12 : 0.35);
          const nx = dx / d, ny = dy / d;
          a.x -= nx * push * (b.mass / (a.mass + b.mass));
          a.y -= ny * push * (b.mass / (a.mass + b.mass));
          b.x += nx * push * (a.mass / (a.mass + b.mass));
          b.y += ny * push * (a.mass / (a.mass + b.mass));
        }
      }
    }
  }

  function mergePair(entity, a, b) {
    const big = a.mass >= b.mass ? a : b;
    const small = a.mass >= b.mass ? b : a;
    big.mass += small.mass;
    big.r = massToR(big.mass);
    big.pulse = 1;
    big.vx = (a.vx * a.mass + b.vx * b.mass) / (a.mass + b.mass);
    big.vy = (a.vy * a.mass + b.vy * b.mass) / (a.mass + b.mass);
    big.x = (a.x * a.mass + b.x * b.mass) / (a.mass + b.mass);
    big.y = (a.y * a.mass + b.y * b.mass) / (a.mass + b.mass);
    spawnRing(big.x, big.y, big.color, big.r * 1.4, 0.3);
    if (entity === player) SFX.play('eat');
    entity.cells.splice(entity.cells.indexOf(small), 1);
  }

  function tryMerge(entity, now) {
    if (entity.cells.length < 2) return;
    for (let i = 0; i < entity.cells.length; i++) {
      for (let j = i + 1; j < entity.cells.length; j++) {
        const a = entity.cells[i], b = entity.cells[j];
        const d = dist(a.x, a.y, b.x, b.y);
        const bigR = Math.max(a.r, b.r);
        const smallR = Math.min(a.r, b.r);
        const ready = now >= a.mergeAt && now >= b.mergeAt;

        // relative approach: small ball slamming into big one can merge slightly early
        const rvx = b.vx - a.vx, rvy = b.vy - a.vy;
        const relSpd = Math.hypot(rvx, rvy);
        const toBx = b.x - a.x, toBy = b.y - a.y;
        const approach = relSpd > 0.01
          ? -(rvx * toBx + rvy * toBy) / (relSpd * (d || 1))
          : 0; // >0 means approaching

        let can = false;
        if (ready && d < bigR * 0.95) can = true;
        // early merge: significant overlap + closing speed after half delay
        else if (
          now >= Math.min(a.mergeAt, b.mergeAt) - MERGE_DELAY * 0.35 &&
          d < bigR - smallR * 0.15 &&
          relSpd > 1.2 &&
          approach > 0.35
        ) can = true;

        if (can) {
          mergePair(entity, a, b);
          return;
        }
      }
    }
  }

  // G key: clear recombine locks and pull fragments toward the largest cell
  function forceMerge(entity) {
    if (!entity || entity.cells.length < 2) return;
    const now = performance.now() / 1000;
    for (const c of entity.cells) {
      c.mergeAt = Math.min(c.mergeAt, now);
    }
    const core = [...entity.cells].sort((a, b) => b.mass - a.mass)[0];
    for (const c of entity.cells) {
      if (c === core) continue;
      const ang = Math.atan2(core.y - c.y, core.x - c.x);
      const pull = 6 + speedOf(c.mass) * 2;
      c.vx = Math.cos(ang) * pull;
      c.vy = Math.sin(ang) * pull;
      c.boost = 4;
    }
    spawnRing(core.x, core.y, core.color, core.r * 2, 0.35);
    // immediate merge if already overlapping
    for (let n = 0; n < 8; n++) tryMerge(entity, now);
  }

  function eatFood(entity) {
    for (const cell of entity.cells) {
      for (let i = foods.length - 1; i >= 0; i--) {
        const f = foods[i];
        if (dist(cell.x, cell.y, f.x, f.y) < cell.r - f.r * 0.3) {
          const mul = entity === player ? 1 : (entity.growthBonus || 2.2);
          cell.mass += f.mass * mul;
          cell.r = massToR(cell.mass);
          cell.pulse = Math.min(1, cell.pulse + 0.35);
          if (entity === player) {
            player.score += 2;
            SFX.play('eat');
            if (Math.random() < 0.12) spawnFloat(f.x, f.y, '+' + Math.floor(f.mass), f.color);
          }
          spawnParticles(f.x, f.y, f.color, 4, 90);
          foods.splice(i, 1);
        }
      }
    }
  }

  function eatEjects(entity) {
    for (const cell of entity.cells) {
      for (let i = ejects.length - 1; i >= 0; i--) {
        const e = ejects[i];
        // brief self-immunity so you don't instantly re-eat your own spit
        if (e.ownerId === entity.id && e.life > 4.6) continue;
        if (dist(cell.x, cell.y, e.x, e.y) < cell.r - e.r * 0.2) {
          cell.mass += e.mass;
          cell.r = massToR(cell.mass);
          cell.pulse = 0.5;
          if (entity === player) {
            player.score += 2;
            SFX.play('eat');
          }
          spawnParticles(e.x, e.y, e.color, 5, 100);
          ejects.splice(i, 1);
        }
      }
    }
  }

  function cellCanEat(a, b) {
    if (a.mass < b.mass * 1.18) return false;
    const d = dist(a.x, a.y, b.x, b.y);
    return d < a.r - b.r * 0.35;
  }

  function handlePredation() {
    const all = [];
    if (player && player.alive) {
      for (const c of player.cells) all.push({ cell: c, entity: player });
    }
    for (const bot of bots) {
      if (!bot.alive) continue;
      for (const c of bot.cells) all.push({ cell: c, entity: bot });
    }

    for (let i = 0; i < all.length; i++) {
      for (let j = 0; j < all.length; j++) {
        if (i === j) continue;
        const A = all[i], B = all[j];
        if (A.entity === B.entity) continue;
        if (isAlly(A.entity, B.entity)) continue; // team cooperation: no friendly fire
        if ((A.entity === player || B.entity === player) && (spawnProtection > 0 || shieldT > 0)) continue;
        if (!cellCanEat(A.cell, B.cell)) continue;

        A.cell.mass += B.cell.mass * 0.9;
        A.cell.r = massToR(A.cell.mass);
        A.cell.pulse = 1;
        spawnParticles(B.cell.x, B.cell.y, B.cell.color, 18, 220);
        spawnRing(B.cell.x, B.cell.y, B.cell.color, B.cell.r * 2.5, 0.45);

        const idx = B.entity.cells.indexOf(B.cell);
        if (idx >= 0) B.entity.cells.splice(idx, 1);

        if (A.entity === player) {
          player.score += Math.floor(B.cell.mass * 2);
          cam.shake = Math.min(12, 3 + B.cell.mass * 0.05);
          spawnFloat(B.cell.x, B.cell.y, '+' + Math.floor(B.cell.mass * 2), '#f0c14b');
          if (B.entity.cells.length === 0) {
            player.kills++;
            SFX.play('kill');
            showToast('击杀', B.entity.name, 0.9);
          } else {
            SFX.play('eatPlayer');
          }
        }

        if (B.entity.cells.length === 0) {
          B.entity.alive = false;
          // remember death spot so respawn is nowhere near here
          B.entity.deathX = B.cell.x;
          B.entity.deathY = B.cell.y;
          if (B.entity === player) {
            gameOver('被 ' + A.entity.name + ' 吞食');
          } else {
            setTimeout(() => respawnBot(B.entity), 2500);
          }
        }
        return;
      }
    }
  }

  function respawnBot(bot) {
    if (state !== 'play' && state !== 'pause') return;
    const i = bots.indexOf(bot);
    if (i < 0) return;
    bots[i] = makeBot(i, {
      avoidX: bot.deathX != null ? bot.deathX : null,
      avoidY: bot.deathY != null ? bot.deathY : null
    });
  }

  function handleViruses(entity) {
    if (!entity || !entity.alive) return;
    for (const cell of entity.cells) {
      for (let vi = viruses.length - 1; vi >= 0; vi--) {
        const v = viruses[vi];
        const d = dist(cell.x, cell.y, v.x, v.y);
        if (d < cell.r - v.r * 0.4 && cell.mass > v.mass * 1.15) {
          if (entity === player && shieldT > 0) continue;

          // At max cell count, absorb virus as mass instead of splitting.
          // Prevents infinite overlap jitter when splitByVirus would be a no-op.
          const freeSlots = MAX_CELLS - entity.cells.length;
          if (freeSlots <= 0) {
            const gained = v.mass * 0.9;
            cell.mass += gained;
            cell.r = massToR(cell.mass);
            cell.pulse = 1;
            spawnParticles(v.x, v.y, '#7cff6b', 16, 160);
            spawnRing(cell.x, cell.y, '#86efac', cell.r * 1.6, 0.4);
            viruses.splice(vi, 1);
            if (entity === player) {
              player.score += Math.floor(gained);
              spawnFloat(cell.x, cell.y - cell.r, '+' + Math.floor(gained), '#4ade80');
              SFX.play('eat');
            }
            return;
          }

          splitByVirus(entity, cell);
          v.x = clamp(rand(300, WORLD - 300), 200, WORLD - 200);
          v.y = clamp(rand(300, WORLD - 300), 200, WORLD - 200);
          v.mass = VIRUS_MASS;
          v.r = massToR(VIRUS_MASS);
          v.flying = 0;
          spawnParticles(cell.x, cell.y, '#7cff6b', 22, 200);
          spawnRing(cell.x, cell.y, '#4ade80', 100, 0.5);
          if (entity === player) {
            cam.shake = 8;
            SFX.play('virus');
          }
          return;
        }
      }
    }

    for (let i = ejects.length - 1; i >= 0; i--) {
      const e = ejects[i];
      for (const v of viruses) {
        if (dist(e.x, e.y, v.x, v.y) < v.r + e.r) {
          v.mass += e.mass * 0.8;
          v.r = massToR(v.mass);
          ejects.splice(i, 1);
          spawnParticles(v.x, v.y, '#86efac', 6, 80);
          if (v.mass > 180) {
            const ang = Math.atan2(e.vy, e.vx) || rand(0, Math.PI * 2);
            viruses.push({
              x: v.x + Math.cos(ang) * (v.r + 20),
              y: v.y + Math.sin(ang) * (v.r + 20),
              mass: VIRUS_MASS,
              r: massToR(VIRUS_MASS),
              spin: 0,
              vx: Math.cos(ang) * 14,
              vy: Math.sin(ang) * 14,
              flying: 1.2
            });
            v.mass = VIRUS_MASS;
            v.r = massToR(VIRUS_MASS);
            spawnRing(v.x, v.y, '#4ade80', 70, 0.35);
          }
          break;
        }
      }
    }
  }

  function splitByVirus(entity, cell) {
    const now = performance.now() / 1000;
    const freeSlots = MAX_CELLS - entity.cells.length;
    // pieces = original + new cells; need freeSlots >= 1 to actually split
    const pieces = Math.min(freeSlots + 1, 8);
    if (pieces <= 1 || freeSlots <= 0) return false;
    const pieceMass = cell.mass / pieces;
    cell.mass = pieceMass;
    cell.r = massToR(pieceMass);
    cell.displayR = cell.r;
    cell.mergeAt = now + MERGE_DELAY + 4;
    cell.squash = 0.5;
    for (let i = 1; i < pieces; i++) {
      if (entity.cells.length >= MAX_CELLS) break;
      const ang = (Math.PI * 2 * i) / pieces + rand(-0.2, 0.2);
      const nc = makeCell(cell.x, cell.y, pieceMass, cell.color, cell.name, entity.id, entity === player, entity.skinId);
      nc.vx = Math.cos(ang) * 16;
      nc.vy = Math.sin(ang) * 16;
      nc.boost = 16;
      nc.mergeAt = now + MERGE_DELAY + 4;
      nc.squash = 0.5;
      entity.cells.push(nc);
    }
    return true;
  }

  // ─── Update ───────────────────────────────────────────────
  function update(dt) {
    time += dt;
    if (state !== 'play') {
      updateFX(dt);
      return;
    }
    const now = performance.now() / 1000;

    if (spawnProtection > 0) spawnProtection -= dt;
    if (shieldT > 0) shieldT -= dt;
    if (dashT > 0) dashT -= dt;
    if (brakeT > 0) brakeT -= dt;
    if (magnetT > 0) {
      magnetT -= dt;
      if (magnetT <= 0) SFX.stopMagnetHum();
    }
    SFX.tickMagnet(magnetT > 0);
    if (cam.shake > 0) cam.shake = Math.max(0, cam.shake - dt * 28);

    for (const k of Object.keys(cooldowns)) {
      if (cooldowns[k] > 0) cooldowns[k] = Math.max(0, cooldowns[k] - dt);
    }
    updateSkillHUD();

    if (toastTimer > 0 && toastTimer < 900) {
      toastTimer -= dt;
      if (toastTimer <= 0) toastEl.classList.remove('show');
    }

    // WASD: set direction; release keys -> keep last direction (uniform linear motion)
    let mx = 0, my = 0;
    if (keys.has('w') || keys.has('arrowup')) my -= 1;
    if (keys.has('s') || keys.has('arrowdown')) my += 1;
    if (keys.has('a') || keys.has('arrowleft')) mx -= 1;
    if (keys.has('d') || keys.has('arrowright')) mx += 1;
    const mlen = Math.hypot(mx, my);
    if (mlen > 0) {
      mx /= mlen; my /= mlen;
      // soft click when direction changes meaningfully
      if (!coasting || Math.hypot(mx - coastDir.x, my - coastDir.y) > 0.55) {
        SFX.play('dir');
      }
      coastDir.x = mx;
      coastDir.y = my;
      moveDir.x = mx;
      moveDir.y = my;
      coasting = true;
      if (brakeT > 0) brakeT = 0; // new input cancels brake hold
    } else if (coasting) {
      moveDir.x = coastDir.x;
      moveDir.y = coastDir.y;
    } else {
      moveDir.x = 0;
      moveDir.y = 0;
    }

    // hold: continue split/eject with a short gap so one press ≠ multi-cascade
    // each split is still only 1 large cell → 2; small cells are skipped
    if (keys.has('k') && now - lastEjectAt >= EJECT_HOLD_GAP) {
      useSkill('k');
      lastEjectAt = now;
    }
    if ((keys.has('j') || keys.has('u')) && now - lastSplitAt >= SPLIT_HOLD_GAP) {
      if (keys.has('j')) useSkill('j');
      else useSkill('u');
      lastSplitAt = now;
    }

    // hold G to keep pulling fragments together
    if (keys.has('g') && player && player.alive && player.cells.length > 1 && cooldowns.g <= 0) {
      useSkill('g');
    }

    if (player && player.alive) {
      const dirLen = Math.hypot(moveDir.x, moveDir.y);
      for (const cell of player.cells) {
        // each cell's speed depends on its own mass
        const sp = speedOf(cell.mass) * (dashT > 0 ? 1.25 : 1);
        if (brakeT > 0) {
          cell.vx = 0;
          cell.vy = 0;
        } else if (dirLen > 0.01) {
          const desiredVx = moveDir.x * sp;
          const desiredVy = moveDir.y * sp;
          if (cell.boost > 0.5) {
            // after split: keep some boost but still trend toward mass-based cruise
            cell.vx = lerp(cell.vx, desiredVx, 0.08);
            cell.vy = lerp(cell.vy, desiredVy, 0.08);
          } else {
            cell.vx = lerp(cell.vx, desiredVx, mlen > 0 ? 0.32 : 0.4);
            cell.vy = lerp(cell.vy, desiredVy, mlen > 0 ? 0.32 : 0.4);
            const cur = Math.hypot(cell.vx, cell.vy);
            if (Math.abs(cur - sp) < 0.06) {
              cell.vx = desiredVx;
              cell.vy = desiredVy;
            }
          }
        } else {
          cell.vx = 0;
          cell.vy = 0;
        }
      }
      moveCells(player, dt);
      applyMagnet(dt);
      tryMerge(player, now);
      eatFood(player);
      eatEjects(player);
      handleViruses(player);

      const tm = totalMass(player);
      player.maxMass = Math.max(player.maxMass, tm);
      if (player.cells.length === 0) gameOver('被吞食了');
    }

    for (const bot of bots) {
      if (!bot.alive) continue;
      updateBot(bot, dt);
      moveCells(bot, dt);
      tryMerge(bot, now);
      eatFood(bot);
      eatEjects(bot);
      handleViruses(bot);
    }

    handlePredation();

    for (let i = ejects.length - 1; i >= 0; i--) {
      const e = ejects[i];
      e.x += e.vx * 60 * dt;
      e.y += e.vy * 60 * dt;
      e.vx *= 0.90;
      e.vy *= 0.90;
      e.life -= dt;
      e.x = clamp(e.x, 4, WORLD - 4);
      e.y = clamp(e.y, 4, WORLD - 4);
      if (e.life <= 0) ejects.splice(i, 1);
    }

    for (const v of viruses) {
      v.spin += dt * 1.2;
      if (v.flying > 0) {
        v.x += (v.vx || 0) * 60 * dt;
        v.y += (v.vy || 0) * 60 * dt;
        v.vx *= 0.98;
        v.vy *= 0.98;
        v.flying -= dt;
        v.x = clamp(v.x, v.r, WORLD - v.r);
        v.y = clamp(v.y, v.r, WORLD - v.r);
      }
    }

    updateFX(dt);

    if (foods.length < FOOD_COUNT) spawnFood(FOOD_COUNT - foods.length);
    if (viruses.length < VIRUS_COUNT) spawnVirus(VIRUS_COUNT - viruses.length);

    const aliveBots = bots.filter(b => b.alive).length;
    if (aliveBots < BOT_COUNT - 4) {
      for (let i = 0; i < bots.length; i++) {
        if (!bots[i].alive) { bots[i] = makeBot(i); break; }
      }
    }

    if (player && player.alive && player.cells.length) {
      const c = centroid(player);
      cam.x = lerp(cam.x, c.x, 0.12);
      cam.y = lerp(cam.y, c.y, 0.12);
      // Mild zoom-out with size only — do NOT explode zoom on split spread
      const maxR = Math.max(...player.cells.map(c => c.r));
      const tm = totalMass(player);
      // Keep largest ball roughly ~18–24% of screen height
      let targetZ = (H * 0.11) / Math.max(maxR, 14);
      // gentle mass soften (late game only)
      targetZ /= (1 + Math.log2(1 + tm / 120) * 0.1);
      // tiny multi-cell nudge (not based on scatter distance)
      if (player.cells.length > 1) {
        targetZ /= (1 + (player.cells.length - 1) * 0.03);
      }
      targetZ = clamp(targetZ, 0.18, 1.35);
      cam.z = lerp(cam.z, targetZ, 0.07);
    }

    updateHUD();
    updateLeaderboard();
  }

  function updateFX(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= p.drag || 0.92;
      p.vy *= p.drag || 0.92;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
    for (let i = rings.length - 1; i >= 0; i--) {
      const r = rings[i];
      r.life -= dt;
      const t = 1 - r.life / r.maxLife;
      r.r = lerp(4, r.maxR, t);
      if (r.life <= 0) rings.splice(i, 1);
    }
    for (let i = trails.length - 1; i >= 0; i--) {
      const tr = trails[i];
      tr.life -= dt;
      if (tr.life <= 0) trails.splice(i, 1);
    }
    for (let i = floats.length - 1; i >= 0; i--) {
      const f = floats[i];
      f.y += f.vy * dt;
      f.life -= dt;
      if (f.life <= 0) floats.splice(i, 1);
    }
  }

  function updateHUD() {
    if (!player) return;
    const tm = player.alive ? totalMass(player) : 0;
    const t = performance.now() / 1000 - player.startTime;
    document.getElementById('hud-mass').textContent = Math.floor(tm);
    document.getElementById('hud-score').textContent = Math.floor(player.score);
    document.getElementById('hud-time').textContent = formatTime(Math.max(0, t));
    document.getElementById('hud-kills').textContent = player.kills;
  }

  function updateLeaderboard() {
    const entries = [];
    if (player && player.alive) entries.push({ name: player.name, mass: totalMass(player), me: true });
    for (const bot of bots) {
      if (!bot.alive) continue;
      entries.push({ name: bot.name, mass: totalMass(bot), me: false });
    }
    entries.sort((a, b) => b.mass - a.mass);
    const box = document.getElementById('lb-rows');
    box.innerHTML = entries.slice(0, 10).map((e, i) =>
      `<div class="row${e.me ? ' me' : ''}">
        <span class="rank">${i + 1}</span>
        <span class="name">${escapeHtml(e.name)}</span>
        <span class="mass">${Math.floor(e.mass)}</span>
      </div>`
    ).join('');
  }

  // ─── Render ───────────────────────────────────────────────
  function worldToScreen(x, y) {
    let sx = (x - cam.x) * cam.z + W / 2;
    let sy = (y - cam.y) * cam.z + H / 2;
    if (cam.shake > 0) {
      sx += (Math.random() - 0.5) * cam.shake;
      sy += (Math.random() - 0.5) * cam.shake;
    }
    return { x: sx, y: sy };
  }

  function currentTheme() {
    return THEMES[selectedStyle] || THEMES.neon;
  }

  function draw() {
    const theme = currentTheme();
    ctx.clearRect(0, 0, W, H);

    // background
    const g = ctx.createRadialGradient(W * 0.5, H * 0.4, 0, W * 0.5, H * 0.5, Math.max(W, H) * 0.8);
    g.addColorStop(0, theme.bg0);
    g.addColorStop(1, theme.bg1);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    drawAmbient(theme);
    drawGrid(theme);

    const tl = worldToScreen(0, 0);
    const br = worldToScreen(WORLD, WORLD);
    ctx.strokeStyle = theme.border;
    ctx.lineWidth = 3;
    ctx.strokeRect(tl.x, tl.y, br.x - tl.x, br.y - tl.y);
    ctx.fillStyle = theme.borderFill;
    ctx.fillRect(tl.x, tl.y, br.x - tl.x, br.y - tl.y);

    // trails under everything organic
    for (const tr of trails) {
      const s = worldToScreen(tr.x, tr.y);
      const a = Math.max(0, tr.life / tr.max);
      ctx.globalAlpha = a * 0.35;
      ctx.beginPath();
      ctx.arc(s.x, s.y, tr.r * cam.z * (0.7 + a * 0.3), 0, Math.PI * 2);
      ctx.fillStyle = tr.color;
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // food
    for (const f of foods) {
      const s = worldToScreen(f.x, f.y);
      if (s.x < -20 || s.y < -20 || s.x > W + 20 || s.y > H + 20) continue;
      f.pulse += 0.05;
      f.spin += 0.02;
      const rr = (f.r + Math.sin(f.pulse) * 0.8) * cam.z;
      // glow
      ctx.globalAlpha = 0.25 * theme.foodAlpha;
      ctx.beginPath();
      ctx.arc(s.x, s.y, rr * 2.2, 0, Math.PI * 2);
      ctx.fillStyle = f.color;
      ctx.fill();
      ctx.globalAlpha = theme.foodAlpha;
      ctx.beginPath();
      ctx.arc(s.x, s.y, Math.max(rr, 1.5), 0, Math.PI * 2);
      ctx.fillStyle = f.color;
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    for (const e of ejects) {
      const s = worldToScreen(e.x, e.y);
      if (s.x < -20 || s.y < -20 || s.x > W + 20 || s.y > H + 20) continue;
      const rr = e.r * cam.z;
      e.spin = (e.spin || 0) + 0.08;
      const skin = SKINS[e.skinId] || SKINS.classic;
      if (skin.drawEject) {
        skin.drawEject(ctx, s, rr, e, time);
      } else {
        ctx.beginPath();
        ctx.arc(s.x, s.y, rr, 0, Math.PI * 2);
        ctx.fillStyle = e.color;
        ctx.fill();
      }
    }

    for (const v of viruses) drawVirus(v);

    // rings
    for (const ring of rings) {
      const s = worldToScreen(ring.x, ring.y);
      const a = Math.max(0, ring.life / ring.maxLife);
      ctx.globalAlpha = a * 0.7;
      ctx.beginPath();
      ctx.arc(s.x, s.y, ring.r * cam.z, 0, Math.PI * 2);
      ctx.strokeStyle = ring.color;
      ctx.lineWidth = (2 + a * 3);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    const drawList = [];
    for (const bot of bots) {
      if (!bot.alive) continue;
      for (const c of bot.cells) drawList.push(c);
    }
    if (player && player.alive) {
      for (const c of player.cells) drawList.push(c);
    }
    drawList.sort((a, b) => a.mass - b.mass);
    for (const c of drawList) drawCell(c);

    for (const p of particles) {
      const s = worldToScreen(p.x, p.y);
      ctx.globalAlpha = Math.max(0, p.life / p.max);
      ctx.beginPath();
      ctx.arc(s.x, s.y, p.r * cam.z, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    for (const f of floats) {
      const s = worldToScreen(f.x, f.y);
      ctx.globalAlpha = Math.max(0, f.life / 0.9);
      ctx.font = '600 14px "JetBrains Mono", monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = f.color;
      ctx.strokeStyle = 'rgba(0,0,0,0.4)';
      ctx.lineWidth = 3;
      ctx.strokeText(f.text, s.x, s.y);
      ctx.fillText(f.text, s.x, s.y);
      ctx.globalAlpha = 1;
    }

    // magnet field visual
    if (player && player.alive && magnetT > 0) {
      const c = centroid(player);
      const s = worldToScreen(c.x, c.y);
      const range = magnetRange() * cam.z;
      const pulse = 0.5 + 0.5 * Math.sin(time * 6);
      ctx.beginPath();
      ctx.arc(s.x, s.y, range, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(167,139,250,${0.25 + pulse * 0.25})`;
      ctx.lineWidth = 2;
      ctx.setLineDash([10, 8]);
      ctx.stroke();
      ctx.setLineDash([]);
      const mg = ctx.createRadialGradient(s.x, s.y, range * 0.2, s.x, s.y, range);
      mg.addColorStop(0, `rgba(167,139,250,${0.08 + pulse * 0.04})`);
      mg.addColorStop(1, 'transparent');
      ctx.fillStyle = mg;
      ctx.beginPath();
      ctx.arc(s.x, s.y, range, 0, Math.PI * 2);
      ctx.fill();
      // rotating hash marks
      for (let i = 0; i < 8; i++) {
        const a = time * 1.8 + i * Math.PI / 4;
        const r0 = range * 0.82, r1 = range * 0.96;
        ctx.beginPath();
        ctx.moveTo(s.x + Math.cos(a) * r0, s.y + Math.sin(a) * r0);
        ctx.lineTo(s.x + Math.cos(a) * r1, s.y + Math.sin(a) * r1);
        ctx.strokeStyle = `rgba(196,181,253,${0.35 + pulse * 0.2})`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    // shield / spawn ring
    if (player && player.alive && (spawnProtection > 0 || shieldT > 0)) {
      for (const c of player.cells) {
        const s = worldToScreen(c.x, c.y);
        const pulse = 0.35 + Math.sin(time * 8) * 0.15;
        ctx.beginPath();
        ctx.arc(s.x, s.y, (c.displayR + 12) * cam.z, 0, Math.PI * 2);
        ctx.strokeStyle = shieldT > 0
          ? `rgba(94,234,212,${0.5 + pulse})`
          : `rgba(148,163,184,${0.35 + pulse})`;
        ctx.lineWidth = shieldT > 0 ? 3 : 2;
        ctx.setLineDash([8, 6]);
        ctx.stroke();
        ctx.setLineDash([]);
        if (shieldT > 0) {
          ctx.globalAlpha = 0.12;
          ctx.beginPath();
          ctx.arc(s.x, s.y, (c.displayR + 10) * cam.z, 0, Math.PI * 2);
          ctx.fillStyle = '#5eead4';
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }
    }

    drawMinimap(theme);
  }

  function drawAmbient(theme) {
    if (theme.ambient === 'scan') {
      const y = ((time * 40) % (H + 80)) - 40;
      const g = ctx.createLinearGradient(0, y - 30, 0, y + 30);
      g.addColorStop(0, 'transparent');
      g.addColorStop(0.5, 'rgba(34,211,238,0.04)');
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.fillRect(0, y - 30, W, 60);
    } else if (theme.ambient === 'spark') {
      ctx.globalAlpha = 0.15;
      for (let i = 0; i < 12; i++) {
        const x = ((Math.sin(time * 0.3 + i * 2.1) * 0.5 + 0.5) * W);
        const y = ((Math.cos(time * 0.25 + i * 1.7) * 0.5 + 0.5) * H);
        ctx.beginPath();
        ctx.arc(x, y, 1.5 + (i % 3), 0, Math.PI * 2);
        ctx.fillStyle = i % 2 ? '#f472b6' : '#fbbf24';
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    } else if (theme.ambient === 'mist') {
      ctx.globalAlpha = 0.04;
      for (let i = 0; i < 5; i++) {
        const x = W * 0.2 * i + Math.sin(time * 0.2 + i) * 40;
        const y = H * 0.3 + Math.cos(time * 0.15 + i) * 60;
        const rg = ctx.createRadialGradient(x, y, 0, x, y, 180);
        rg.addColorStop(0, '#e7e5e4');
        rg.addColorStop(1, 'transparent');
        ctx.fillStyle = rg;
        ctx.fillRect(x - 180, y - 180, 360, 360);
      }
      ctx.globalAlpha = 1;
    } else if (theme.ambient === 'aurora') {
      for (let i = 0; i < 3; i++) {
        const y = H * (0.2 + i * 0.2) + Math.sin(time * 0.4 + i) * 30;
        const g = ctx.createLinearGradient(0, y - 40, W, y + 40);
        const colors = ['rgba(167,139,250,0.05)', 'rgba(52,211,153,0.05)', 'rgba(56,189,248,0.05)'];
        g.addColorStop(0, 'transparent');
        g.addColorStop(0.3 + i * 0.1, colors[i]);
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.fillRect(0, y - 50, W, 100);
      }
    } else if (theme.ambient === 'day') {
      // soft sun glow
      const sg = ctx.createRadialGradient(W * 0.78, H * 0.12, 0, W * 0.78, H * 0.12, Math.max(W, H) * 0.45);
      sg.addColorStop(0, 'rgba(255, 236, 180, 0.35)');
      sg.addColorStop(0.4, 'rgba(186, 230, 253, 0.12)');
      sg.addColorStop(1, 'transparent');
      ctx.fillStyle = sg;
      ctx.fillRect(0, 0, W, H);
    } else if (theme.ambient === 'paper') {
      ctx.globalAlpha = 0.03;
      for (let i = 0; i < 40; i++) {
        const x = (Math.sin(i * 12.3 + time * 0.05) * 0.5 + 0.5) * W;
        const y = (Math.cos(i * 9.1 + time * 0.04) * 0.5 + 0.5) * H;
        ctx.fillStyle = i % 2 ? '#9a3412' : '#44403c';
        ctx.fillRect(x, y, 1.2, 1.2);
      }
      ctx.globalAlpha = 1;
    } else if (theme.ambient === 'mint') {
      const mg = ctx.createRadialGradient(W * 0.3, H * 0.7, 0, W * 0.5, H * 0.5, Math.max(W, H) * 0.6);
      mg.addColorStop(0, 'rgba(167, 243, 208, 0.25)');
      mg.addColorStop(1, 'transparent');
      ctx.fillStyle = mg;
      ctx.fillRect(0, 0, W, H);
    }
  }

  function drawGrid(theme) {
    const step = 80;
    const left = cam.x - W / 2 / cam.z;
    const top = cam.y - H / 2 / cam.z;
    const right = cam.x + W / 2 / cam.z;
    const bottom = cam.y + H / 2 / cam.z;
    const x0 = Math.floor(left / step) * step;
    const y0 = Math.floor(top / step) * step;

    ctx.strokeStyle = theme.grid;
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = x0; x <= right; x += step) {
      const s1 = worldToScreen(x, top);
      const s2 = worldToScreen(x, bottom);
      ctx.moveTo(s1.x, s1.y);
      ctx.lineTo(s2.x, s2.y);
    }
    for (let y = y0; y <= bottom; y += step) {
      const s1 = worldToScreen(left, y);
      const s2 = worldToScreen(right, y);
      ctx.moveTo(s1.x, s1.y);
      ctx.lineTo(s2.x, s2.y);
    }
    ctx.stroke();
  }

  function drawCell(cell) {
    const s = worldToScreen(cell.x, cell.y);
    let r = cell.displayR * cam.z;
    if (s.x < -r - 50 || s.y < -r - 50 || s.x > W + r + 50 || s.y > H + r + 50) return;

    // squash / stretch along velocity
    const spd = Math.hypot(cell.vx, cell.vy);
    const ang = Math.atan2(cell.vy, cell.vx) || 0;
    const stretch = 1 + Math.min(0.22, spd * 0.04) + cell.squash * 0.25;
    const squish = 1 / stretch;

    // soft shadow
    ctx.save();
    ctx.translate(s.x + 2, s.y + 4);
    ctx.rotate(ang);
    ctx.scale(stretch, squish);
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(ang);
    ctx.scale(stretch, squish);

    const skinId = cell.skinId || 'classic';
    const skin = SKINS[skinId] || SKINS.classic;
    // draw skin in local space: convert to fake screen coords at origin
    const local = { x: 0, y: 0 };
    const fakeCell = cell;
    skin.draw(ctx, local, r, fakeCell, time);

    // rim light
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = Math.max(1, r * 0.05);
    ctx.stroke();
    ctx.restore();

    // name + mass (not distorted)
    if (r > 12) {
      const fontSize = clamp(r * 0.38, 10, 22);
      const light = !!(currentTheme().light);
      ctx.font = `600 ${fontSize}px "Noto Sans SC", "Inter", system-ui, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.lineWidth = light ? 3.5 : 3;
      ctx.strokeStyle = light ? 'rgba(255,255,255,0.75)' : 'rgba(0,0,0,0.45)';
      ctx.fillStyle = light ? '#0f172a' : '#fff';
      ctx.strokeText(cell.name, s.x, s.y - fontSize * 0.15);
      ctx.fillText(cell.name, s.x, s.y - fontSize * 0.15);
      if (r > 18) {
        ctx.font = `500 ${Math.max(9, fontSize * 0.7)}px "JetBrains Mono", monospace`;
        ctx.fillStyle = light ? 'rgba(15,23,42,0.75)' : 'rgba(255,255,255,0.85)';
        ctx.strokeText(String(Math.floor(cell.mass)), s.x, s.y + fontSize * 0.75);
        ctx.fillText(String(Math.floor(cell.mass)), s.x, s.y + fontSize * 0.75);
      }
    }
  }

  function drawVirus(v) {
    const s = worldToScreen(v.x, v.y);
    const r = v.r * cam.z;
    if (s.x < -r - 30 || s.y < -r - 30 || s.x > W + r + 30 || s.y > H + r + 30) return;

    // glow
    ctx.globalAlpha = 0.2;
    ctx.beginPath();
    ctx.arc(s.x, s.y, r * 1.3, 0, Math.PI * 2);
    ctx.fillStyle = '#4ade80';
    ctx.fill();
    ctx.globalAlpha = 1;

    const spikes = 18;
    ctx.beginPath();
    for (let i = 0; i < spikes; i++) {
      const a = v.spin + (i / spikes) * Math.PI * 2;
      const rr = i % 2 === 0 ? r * (1.15 + 0.04 * Math.sin(time * 6 + i)) : r * 0.86;
      const x = s.x + Math.cos(a) * rr;
      const y = s.y + Math.sin(a) * rr;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    const grad = ctx.createRadialGradient(s.x, s.y, r * 0.2, s.x, s.y, r);
    grad.addColorStop(0, '#b8ff7a');
    grad.addColorStop(0.6, '#4ade80');
    grad.addColorStop(1, '#166534');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(220,255,180,0.45)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  function drawMinimap(theme) {
    const s = 148;
    mctx.clearRect(0, 0, s, s);
    mctx.fillStyle = theme.bg1;
    mctx.fillRect(0, 0, s, s);
    mctx.strokeStyle = theme.border;
    mctx.strokeRect(0.5, 0.5, s - 1, s - 1);

    const sc = s / WORLD;
    mctx.fillStyle = 'rgba(74,222,128,0.7)';
    for (const v of viruses) {
      mctx.fillRect(v.x * sc - 1, v.y * sc - 1, 2, 2);
    }
    for (const bot of bots) {
      if (!bot.alive) continue;
      mctx.fillStyle = bot.color;
      const c = centroid(bot);
      const rr = Math.max(1.5, Math.sqrt(totalMass(bot)) * 0.12);
      mctx.beginPath();
      mctx.arc(c.x * sc, c.y * sc, rr, 0, Math.PI * 2);
      mctx.fill();
    }
    if (player && player.alive) {
      const c = centroid(player);
      mctx.fillStyle = player.color;
      mctx.beginPath();
      mctx.arc(c.x * sc, c.y * sc, Math.max(2.5, Math.sqrt(totalMass(player)) * 0.15), 0, Math.PI * 2);
      mctx.fill();
      const vw = (W / cam.z) * sc;
      const vh = (H / cam.z) * sc;
      mctx.strokeStyle = 'rgba(232,237,245,0.35)';
      mctx.lineWidth = 1;
      mctx.strokeRect(c.x * sc - vw / 2, c.y * sc - vh / 2, vw, vh);
    }
  }

  // ─── Loop ─────────────────────────────────────────────────
  function frame(t) {
    const dt = Math.min(0.033, (t - lastT) / 1000 || 0.016);
    lastT = t;
    update(dt);
    draw();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // menu backdrop
  function menuBackdrop() {
    if (state !== 'menu') return;
    if (foods.length === 0) {
      spawnFood(220);
      cam.x = WORLD / 2;
      cam.y = WORLD / 2;
      cam.z = 0.55;
    }
  }
  setInterval(() => {
    if (state === 'menu') {
      menuBackdrop();
      for (const f of foods) {
        f.x += Math.sin(f.pulse) * 0.15;
        f.y += Math.cos(f.pulse * 0.7) * 0.15;
        f.pulse += 0.02;
      }
      cam.x = WORLD / 2 + Math.sin(performance.now() / 8000) * 200;
      cam.y = WORLD / 2 + Math.cos(performance.now() / 10000) * 160;
    }
  }, 33);
  menuBackdrop();

  // try start menu BGM early (works after user gesture unlock)
  document.getElementById('start-screen')?.addEventListener('pointerdown', () => {
    SFX.ensure();
    if (SFX.isEnabled() && state === 'menu') SFX.startBGM('menu');
  }, { once: true });
})();
</script>
</body>
</html>
